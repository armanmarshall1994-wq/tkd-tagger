<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TKD Tagger v4.8 Pro</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --red: #e94560; --blue: #3a8fd1; --green: #27ae60;
  --bg: #0d0d14; --bg2: #13131f; --bg3: #1a1a2e;
  --border: #252535; --text: #d0d0e0; --muted: #6060a0;
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; overflow: hidden; }

header {
  height: 40px; background: var(--bg2); border-bottom: 2px solid var(--red);
  display: flex; align-items: center; gap: 10px; padding: 0 14px; flex-shrink: 0;
}
.logo { font-size: 14px; font-weight: 900; color: #fff; white-space: nowrap; }
.logo span { color: var(--red); }
#urlInput {
  flex: 1; background: #000; border: 1px solid var(--border);
  border-radius: 5px; padding: 4px 10px; color: #fff; font-size: 12px; outline: none;
}
#loadBtn { padding: 4px 12px; background: var(--red); color: #fff; border: none; border-radius: 5px; font-weight: 800; cursor: pointer; font-size: 11px; }

/* ГЛАВНЫЙ КОНТЕЙНЕР */
#main-layout {
  display: flex;
  flex-direction: column;
  height: calc(100vh - 40px);
}

#top-section {
  display: flex;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}

/* ЛЕВАЯ ЧАСТЬ (ВИДЕО) */
#video-side {
  width: 65%;
  display: flex;
  flex-direction: column;
  background: #000;
  border-right: 1px solid var(--border);
  padding: 10px;
  align-items: center; /* Центрируем плеер если он уже ширины колонки */
}

#player-container {
  width: 100%;
  max-width: 800px; /* Ограничиваем ширину, чтобы не был слишком широким */
  aspect-ratio: 16 / 9;
  background: #000;
  position: relative;
  flex-shrink: 1;
}
#player-container iframe, #player-container > div {
  position: absolute !important; top: 0; left: 0; width: 100% !important; height: 100% !important;
}

#video-controls {
  width: 100%;
  max-width: 800px;
  margin-top: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* ПРАВАЯ ЧАСТЬ (ТЕГИ) */
#tag-side {
  width: 35%;
  background: var(--bg2);
  display: flex;
  flex-direction: column;
  padding: 15px;
  gap: 10px;
  overflow-y: auto;
}

/* НИЖНЯЯ ЧАСТЬ (СОБЫТИЯ) */
#bottom-section {
  height: 140px;
  background: var(--bg);
  border-top: 2px solid var(--border);
  padding: 10px 15px;
  overflow-y: auto;
  flex-shrink: 0;
}

/* КНОПКИ И UI */
.btn-row { display: flex; gap: 5px; width: 100%; }
.cbtn {
  flex: 1; background: var(--bg3); border: 1px solid var(--border);
  color: var(--text); padding: 8px 2px; border-radius: 6px;
  font-size: 11px; font-weight: 700; cursor: pointer;
}
.spd-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 6px; cursor: pointer; font-weight: 800; }
#speedDisp { min-width: 35px; text-align: center; font-size: 12px; font-weight: 900; color: var(--red); }

#progress-bar { flex: 1; height: 6px; background: var(--border); border-radius: 3px; cursor: pointer; position: relative; margin: 5px 0; }
#progress-inner { height: 100%; background: var(--red); border-radius: 3px; width: 0%; pointer-events: none; }
#time-text { font-family: monospace; font-size: 11px; color: var(--muted); }

#anchor-btn {
  background: var(--red); color: #fff; font-size: 13px; font-weight: 900;
  padding: 12px; border-radius: 8px; border: none; width: 100%; cursor: pointer;
  margin-top: 5px;
}

.step-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; margin-bottom: 2px; }
#current-step-text { font-size: 14px; font-weight: 900; color: var(--red); margin-bottom: 10px; }
#tag-buttons-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.tag-btn {
  padding: 12px 5px; border-radius: 8px; border: 2px solid var(--border);
  background: var(--bg3); color: var(--text); font-size: 12px; font-weight: 800;
  cursor: pointer;
}
.tag-btn.blue { border-color: var(--blue); color: var(--blue); }
.tag-btn.red { border-color: var(--red); color: var(--red); }

.preview-box {
  margin-top: auto; background: #000; border: 1px solid var(--border); border-radius: 8px;
  padding: 10px; display: flex; align-items: center; justify-content: space-between;
}
#final-code { font-size: 20px; font-weight: 900; color: var(--red); letter-spacing: 2px; }
#save-event-btn { padding: 8px 15px; background: var(--green); color: #fff; border: none; border-radius: 6px; font-weight: 900; cursor: pointer; }

#events-list { display: flex; flex-wrap: wrap; gap: 8px; }
.event-card { background: var(--bg2); border-radius: 8px; padding: 8px 12px; border-left: 4px solid var(--border); min-width: 140px; position: relative; }
.event-card.blue { border-left-color: var(--blue); }
.event-card.red { border-left-color: var(--red); }
.card-info { display: flex; justify-content: space-between; font-weight: 900; font-size: 13px; }
.card-link { color: var(--blue); text-decoration: none; font-size: 11px; font-weight: 700; display: block; margin-top: 4px; }
.del-ev { position: absolute; top: 4px; right: 6px; color: var(--muted); border: none; background: none; cursor: pointer; }

@media (max-width: 1023px) {
  body { overflow-y: auto; }
  #main-layout { height: auto; }
  #top-section { flex-direction: column; height: auto; overflow: visible; }
  #video-side, #tag-side { width: 100%; border: none; }
  #bottom-section { height: auto; overflow: visible; }
}
</style>
</head>
<body>

<header>
  <div class="logo">TKD <span>V4.8</span></div>
  <input type="text" id="urlInput" placeholder="Вставьте ссылку на YouTube...">
  <button id="loadBtn" onclick="loadVideo()">ЗАГРУЗИТЬ</button>
</header>

<div id="main-layout">
  <div id="top-section">
    <div id="video-side">
      <div id="player-container"><div id="player"></div></div>
      <div id="video-controls">
        <div class="btn-row">
          <button class="cbtn" id="playBtn" onclick="togglePlay()">ПУСК</button>
          <button class="cbtn" onclick="seekRel(-10)">-10с</button>
          <button class="cbtn" onclick="seekRel(-3)">-3с</button>
          <button class="cbtn" onclick="seekRel(3)">+3с</button>
          <button class="cbtn" onclick="seekRel(10)">+10с</button>
          <button class="spd-btn" onclick="chSpeed(-1)">−</button>
          <div id="speedDisp">1x</div>
          <button class="spd-btn" onclick="chSpeed(1)">+</button>
        </div>
        <div class="btn-row" style="align-items:center;">
          <div id="progress-bar" onclick="seekClick(event)"><div id="progress-inner"></div></div>
          <div id="time-text" style="margin-left:10px;">0:00 / 0:00</div>
        </div>
        <button id="anchor-btn" onclick="setAnchor()">📍 ФИКСИРОВАТЬ МОМЕНТ (ЯКОРЬ)</button>
      </div>
    </div>

    <div id="tag-side">
      <div class="step-label">Текущий шаг</div>
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <div id="current-step-text">Ожидание якоря...</div>
        <button id="backBtn" onclick="goBack()" style="display:none; background:var(--bg3); border:1px solid var(--border); color:var(--text); padding:4px 8px; border-radius:4px; cursor:pointer; font-size:10px;">◀ Назад</button>
      </div>
      <div id="tag-buttons-grid"></div>
      <div class="preview-box">
        <div id="final-code">—</div>
        <button id="save-event-btn" onclick="saveEvent()" style="display:none">СОХРАНИТЬ</button>
      </div>
    </div>
  </div>

  <div id="bottom-section">
    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
      <h2 style="font-size:12px; font-weight:900;">📋 СОБЫТИЯ (<span id="evCount">0</span>)</h2>
      <button onclick="dlJSON()" style="background:none; border:none; color:var(--blue); font-weight:800; cursor:pointer; font-size:11px;">СКАЧАТЬ JSON</button>
    </div>
    <div id="events-list"></div>
  </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
let player, ready=false, vidId="", events=[], anchorTime=0, curStep=-1, sel={}, progTimer=null;
const SPEEDS=[0.25,0.5,0.75,1,1.25,1.5,2];
let spdIdx=3;

const STEPS=[
  {key:"fighter", label:"КТО УДАРИЛ?", opts:[{code:"B",label:"🔵 СИНИЙ",cls:"blue"},{code:"R",label:"🔴 КРАСНЫЙ",cls:"red"}]},
  {key:"init", label:"ТИП АТАКИ", opts:[{code:"A",label:"АТАКА"},{code:"C",label:"КОНТРА"},{code:"S",label:"ВСТРЕЧНЫЙ"}]},
  {key:"weapon", label:"ЧЕМ?", opts:[{code:"1",label:"ПЕРЕДНЯЯ"},{code:"2",label:"ЗАДНЯЯ"},{code:"3",label:"РУКА"},{code:"4",label:"РАЗВОРОТ"}]},
  {key:"zone", label:"КУДА?", opts:[{code:"V",label:"КОРПУС"},{code:"H",label:"ГОЛОВА"}]},
  {key:"result", label:"РЕЗУЛЬТАТ", opts:[{code:"1",label:"+1"},{code:"2",label:"+2"},{code:"3",label:"+3"},{code:"4",label:"+4"},{code:"0",label:"МИМО"},{code:"-",label:"ГАМ-ДЖ."}]}
];

function onYouTubeIframeAPIReady(){
  player = new YT.Player("player",{
    height:"100%", width:"100%", videoId:"",
    playerVars:{playsinline:1, rel:0, controls:0, disablekb:1},
    events:{
      onReady: ()=>{ ready=true; },
      onStateChange: e=>{
        document.getElementById("playBtn").textContent = e.data===1 ? "ПАУЗА" : "ПУСК";
        if(e.data===1) startProg(); else stopProg();
      }
    }
  });
}

function loadVideo(){
  const url = document.getElementById("urlInput").value;
  const m = url.match(/(?:v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  if(m){ vidId=m[1]; player.loadVideoById(vidId); }
}

function togglePlay(){ player.getPlayerState()===1 ? player.pauseVideo() : player.playVideo(); }
function seekRel(s){ player.seekTo(player.getCurrentTime()+s, true); }
function seekClick(e){
  const r = document.getElementById("progress-bar").getBoundingClientRect();
  player.seekTo(((e.clientX-r.left)/r.width)*player.getDuration(), true);
}
function chSpeed(d){
  spdIdx = Math.max(0, Math.min(SPEEDS.length-1, spdIdx+d));
  if(ready) player.setPlaybackRate(SPEEDS[spdIdx]);
  document.getElementById("speedDisp").textContent = SPEEDS[spdIdx]+"x";
}
function startProg(){
  stopProg();
  progTimer = setInterval(()=>{
    const c=player.getCurrentTime()||0, d=player.getDuration()||1;
    document.getElementById("progress-inner").style.width = (c/d*100)+"%";
    document.getElementById("time-text").textContent = fmt(c)+" / "+fmt(d);
  },500);
}
function stopProg(){ if(progTimer) clearInterval(progTimer); }
function fmt(s){ s=Math.floor(s); return Math.floor(s/60)+":"+String(s%60).padStart(2,"0"); }

function setAnchor(){
  const t = player.getCurrentTime();
  anchorTime = Math.floor(Math.max(0, t-3));
  player.seekTo(Math.max(0, t-5), true);
  player.setPlaybackRate(0.5); spdIdx=1;
  document.getElementById("speedDisp").textContent="0.5x";
  player.playVideo();
  curStep=0; sel={}; renderStep();
}

function renderStep(){
  if(curStep<0) return;
  const step = STEPS[curStep];
  document.getElementById("current-step-text").textContent = step.label;
  document.getElementById("backBtn").style.display = "block";
  document.getElementById("save-event-btn").style.display = "none";
  const container = document.getElementById("tag-buttons-grid");
  container.innerHTML = "";
  step.opts.forEach(opt=>{
    const b = document.createElement("button");
    b.className = "tag-btn "+(opt.cls||"");
    b.textContent = opt.label;
    b.onclick = ()=> pick(step.key, opt.code);
    container.appendChild(b);
  });
}

function pick(key, code){
  sel[key] = code;
  updateCode();
  if(curStep < STEPS.length-1){ curStep++; renderStep(); }
  else {
    document.getElementById("tag-buttons-grid").innerHTML="";
    document.getElementById("save-event-btn").style.display="block";
    document.getElementById("current-step-text").textContent="✅ Готово";
  }
}

function updateCode(){
  document.getElementById("final-code").textContent = (sel.fighter||"")+(sel.init||"")+(sel.weapon||"")+(sel.zone||"")+(sel.result||"");
}

function saveEvent(){
  events.push({ id: Date.now(), fighter: sel.fighter==="B" ? "Blue" : "Red", time: anchorTime, code: document.getElementById("final-code").textContent, link: "https://youtu.be/"+vidId+"?t="+anchorTime });
  spdIdx=3; player.setPlaybackRate(1); document.getElementById("speedDisp").textContent="1x";
  renderEvents(); resetTag();
}

function resetTag(){
  curStep=-1; sel={}; document.getElementById("tag-buttons-grid").innerHTML="";
  document.getElementById("save-event-btn").style.display="none"; document.getElementById("backBtn").style.display="none";
  document.getElementById("final-code").textContent="—"; document.getElementById("current-step-text").textContent="Ожидание якоря...";
}

function goBack(){
  if(curStep<=0){ spdIdx=3; player.setPlaybackRate(1); document.getElementById("speedDisp").textContent="1x"; resetTag(); }
  else { curStep--; delete sel[STEPS[curStep].key]; renderStep(); }
}

function renderEvents(){
  const list = document.getElementById("events-list"); list.innerHTML="";
  document.getElementById("evCount").textContent = events.length;
  events.slice().reverse().forEach(ev=>{
    const card = document.createElement("div");
    card.className = "event-card "+ev.fighter.toLowerCase();
    card.innerHTML = `<div class="card-info"><span>${ev.code}</span><span>${fmt(ev.time)}</span></div><a class="card-link" href="${ev.link}" target="_blank">▶ Повтор</a><button class="del-ev" onclick="delEv(${ev.id})">✕</button>`;
    list.appendChild(card);
  });
}

function delEv(id){ events=events.filter(x=>x.id!==id); renderEvents(); }
function dlJSON(){
  const blob = new Blob([JSON.stringify(events,null,2)],{type:"application/json"});
  const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "tkd_report.json"; a.click();
}

window.addEventListener("keydown", e=>{
  if(document.activeElement.tagName==="INPUT") return;
  if(e.code==="Space"){ e.preventDefault(); curStep<0 ? setAnchor() : togglePlay(); }
  if(e.code==="Backspace") goBack();
});
</script>
</body>
</html>
