<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TKD Tagger v1.7</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #0a0a0a; color: #e0e0e0; height: 100vh; max-height: 100vh; display: flex; flex-direction: column; overflow: hidden; font-size: 13px; }

    header { background: #161625; padding: 6px 14px; display: flex; align-items: center; gap: 10px; border-bottom: 2px solid #e94560; flex-shrink: 0; }
    header h1 { font-size: 13px; color: #e94560; text-transform: uppercase; letter-spacing: 1px; white-space: nowrap; }
    #urlInput { flex: 1; padding: 5px 10px; border-radius: 4px; border: 1px solid #333; background: #000; color: #fff; font-size: 12px; }
    #loadBtn { padding: 5px 12px; background: #e94560; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; white-space: nowrap; }

    .main { display: flex; flex: 1; overflow: hidden; min-height: 0; }

    /* ЛЕВАЯ КОЛОНКА */
    #left { flex: 1; display: flex; flex-direction: column; padding: 8px; gap: 6px; overflow: hidden; min-width: 0; }

    #player-wrapper { position: relative; width: 100%; background: #000; border-radius: 6px; overflow: hidden; flex-shrink: 0; }
    #player-wrapper { aspect-ratio: 16/9; max-height: 38vh; }
    #player { width: 100%; height: 100%; }
    #player-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 38px; }

    /* Контролы */
    #custom-controls { display: flex; align-items: center; gap: 5px; background: #161625; padding: 5px 10px; border-radius: 6px; flex-shrink: 0; flex-wrap: nowrap; }
    .ctrl-btn { background: #2a2a3a; border: 1px solid #444; color: #fff; padding: 3px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; white-space: nowrap; flex-shrink: 0; }
    .ctrl-btn:hover { background: #e94560; border-color: #e94560; }
    #progressBar { flex: 1; height: 5px; background: #333; border-radius: 3px; cursor: pointer; min-width: 40px; }
    #progressFill { height: 100%; background: #e94560; border-radius: 3px; width: 0%; pointer-events: none; }
    #timeDisplay { font-size: 10px; color: #aaa; white-space: nowrap; flex-shrink: 0; }
    #speedDisplay { font-size: 11px; color: #e94560; font-weight: bold; min-width: 28px; text-align: center; flex-shrink: 0; }
    #anchorBtn { background: #e94560; border-color: #e94560; font-weight: bold; }
    #anchorBtn:hover { background: #c0392b; }

    /* Пошаговый ввод */
    #tagging-panel { background: #161625; border-radius: 6px; padding: 8px 12px; flex-shrink: 0; }

    #step-header { display: flex; align-items: center; gap: 6px; margin-bottom: 7px; }
    .step-dot { width: 7px; height: 7px; border-radius: 50%; background: #333; flex-shrink: 0; }
    .step-dot.active { background: #e94560; }
    .step-dot.done { background: #27ae60; }
    #step-label { font-size: 11px; color: #aaa; flex: 1; }
    #backBtn { padding: 3px 10px; background: transparent; border: 1px solid #555; color: #aaa; border-radius: 4px; cursor: pointer; font-size: 11px; display: none; }
    #backBtn:hover { border-color: #e94560; color: #e94560; }

    #step-buttons { display: flex; gap: 6px; flex-wrap: wrap; min-height: 32px; align-items: center; }
    .step-btn { padding: 5px 12px; border-radius: 5px; border: 2px solid #444; background: #1a1a2e; color: #ccc; cursor: pointer; font-size: 12px; font-weight: bold; transition: all 0.12s; }
    .step-btn:hover { border-color: #e94560; color: #fff; }
    .step-btn.selected { border-color: #27ae60; background: #1a3a2a; color: #27ae60; }
    .step-btn.fighter-b { border-color: #3498db; color: #3498db; }
    .step-btn.fighter-b.selected { background: #1a2a3a; color: #fff; }
    .step-btn.fighter-r { border-color: #e74c3c; color: #e74c3c; }
    .step-btn.fighter-r.selected { background: #3a1a1a; color: #fff; }

    #code-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
    #currentCodeFull { font-size: 18px; font-weight: bold; color: #e94560; letter-spacing: 2px; min-width: 100px; }
    #currentDesc { font-size: 11px; color: #777; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #saveBtn { padding: 5px 14px; background: #27ae60; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; display: none; flex-shrink: 0; }
    #saveBtn:hover { background: #2ecc71; }
    #resetBtn { padding: 5px 10px; background: transparent; color: #666; border: 1px solid #333; border-radius: 4px; cursor: pointer; font-size: 11px; flex-shrink: 0; }
    #resetBtn:hover { color: #e94560; border-color: #e94560; }
    #statusMsg { font-size: 10px; color: #e94560; font-style: italic; margin-top: 3px; min-height: 14px; }

    /* ПРАВАЯ КОЛОНКА */
    #right { width: 280px; flex-shrink: 0; display: flex; flex-direction: column; background: #111; border-left: 1px solid #222; }
    #rightHeader { padding: 8px 12px; background: #161625; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; flex-shrink: 0; }
    #eventsList { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
    .event-card { background: #1a1a1a; border-radius: 5px; padding: 8px; border-left: 3px solid #444; position: relative; }
    .event-card.blue { border-left-color: #3498db; }
    .event-card.red { border-left-color: #e74c3c; }
    .event-card .etime { position: absolute; top: 7px; right: 7px; font-size: 10px; color: #555; }
    .event-card .ecode { font-size: 14px; font-weight: bold; margin-bottom: 2px; }
    .event-card .edesc { font-size: 10px; color: #888; margin-bottom: 5px; line-height: 1.4; }
    .event-card a { font-size: 10px; color: #4a9eff; text-decoration: none; }
    .event-card a:hover { text-decoration: underline; }
    .event-card textarea { width: 100%; background: #000; border: 1px solid #2a2a2a; color: #bbb; font-size: 10px; padding: 3px; margin-top: 5px; border-radius: 3px; resize: none; height: 34px; }
    .del-btn { position: absolute; bottom: 7px; right: 7px; color: #ff4d4d; cursor: pointer; font-size: 10px; background: none; border: none; }
    #actions { padding: 8px; flex-shrink: 0; }
    .action-btn { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #e94560; background: transparent; color: #e94560; font-weight: bold; cursor: pointer; font-size: 11px; }
    .action-btn:hover { background: #e94560; color: #fff; }
  </style>
</head>
<body>

<header>
  <h1>⚡ TKD Tagger v1.7</h1>
  <input type="text" id="urlInput" placeholder="Вставьте ссылку на YouTube">
  <button id="loadBtn" onclick="loadVideo()">ЗАГРУЗИТЬ</button>
</header>

<div class="main">
  <div id="left">
    <div id="player-wrapper">
      <div id="player"></div>
      <div id="player-overlay"></div>
    </div>

    <div id="custom-controls">
      <button class="ctrl-btn" id="playPauseBtn" onclick="togglePlay()">▶</button>
      <button class="ctrl-btn" onclick="seekRel(-10)">«10</button>
      <button class="ctrl-btn" onclick="seekRel(-3)">«3</button>
      <button class="ctrl-btn" onclick="seekRel(3)">3»</button>
      <button class="ctrl-btn" onclick="seekRel(10)">10»</button>
      <div id="progressBar" onclick="seekByClick(event)"><div id="progressFill"></div></div>
      <div id="timeDisplay">0:00/0:00</div>
      <button class="ctrl-btn" onclick="changeSpeed(-1)">🐢</button>
      <div id="speedDisplay">1x</div>
      <button class="ctrl-btn" onclick="changeSpeed(1)">🐇</button>
      <button class="ctrl-btn" id="anchorBtn" onclick="setAnchor()">📍 ЯКОРЬ [Space]</button>
    </div>

    <div id="tagging-panel">
      <div id="step-header">
        <div class="step-dot" id="dot0"></div>
        <div class="step-dot" id="dot1"></div>
        <div class="step-dot" id="dot2"></div>
        <div class="step-dot" id="dot3"></div>
        <div class="step-dot" id="dot4"></div>
        <span id="step-label">Нажмите ЯКОРЬ или ПРОБЕЛ для начала</span>
        <button id="backBtn" onclick="goBack()">◀ Назад</button>
      </div>
      <div id="step-buttons"></div>
      <div id="code-row">
        <div id="currentCodeFull">—</div>
        <div id="currentDesc"></div>
        <button id="saveBtn" onclick="saveEvent()">✅ СОХРАНИТЬ</button>
        <button id="resetBtn" onclick="resetTagging()">✖</button>
      </div>
      <div id="statusMsg"></div>
    </div>
  </div>

  <div id="right">
    <div id="rightHeader">
      <span style="font-size:13px;font-weight:bold;">СОБЫТИЯ</span>
      <span id="eventCount" style="color:#e94560;font-weight:bold;font-size:16px;">0</span>
    </div>
    <div id="eventsList"><div style="color:#444;font-size:11px;text-align:center;margin-top:20px;">Событий пока нет</div></div>
    <div id="actions"><button class="action-btn" onclick="downloadJSON()">⬇ СКАЧАТЬ JSON</button></div>
  </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
let player, playerReady = false, videoId = "", events = [];
let anchorTime = 0;
let speeds = [0.25, 0.5, 0.75, 1, 1.25, 1.5, 2];
let speedIdx = 3;
let progressInterval = null;

const STEPS = [
  { key: "fighter", label: "1: Боец", options: [
    { code: "B", label: "🔵 Blue", cls: "fighter-b" },
    { code: "R", label: "🔴 Red",  cls: "fighter-r" }
  ]},
  { key: "initiative", label: "2: Инициатива", options: [
    { code: "A", label: "A — Атака" },
    { code: "C", label: "C — Контра" },
    { code: "S", label: "S — Встречный" }
  ]},
  { key: "weapon", label: "3: Оружие", options: [
    { code: "1", label: "1 — Передняя" },
    { code: "2", label: "2 — Задняя" },
    { code: "3", label: "3 — Рука" },
    { code: "4", label: "4 — Разворот" }
  ]},
  { key: "zone", label: "4: Зона", options: [
    { code: "V", label: "V — Корпус" },
    { code: "H", label: "H — Голова" }
  ]},
  { key: "result", label: "5: Результат", options: [
    { code: "1", label: "+1" },
    { code: "2", label: "+2" },
    { code: "3", label: "+3" },
    { code: "4", label: "+4" },
    { code: "0", label: "Мимо" },
    { code: "-", label: "Гам-джон" }
  ]}
];

let currentStep = -1;
let selections = {};

// YouTube API
function onYouTubeIframeAPIReady() {
  player = new YT.Player("player", {
    height: "100%", width: "100%", videoId: "",
    playerVars: { playsinline: 1, rel: 0, modestbranding: 1, controls: 0 },
    events: {
      onReady: () => { playerReady = true; },
      onStateChange: (e) => {
        document.getElementById("playPauseBtn").textContent = e.data === YT.PlayerState.PLAYING ? "⏸" : "▶";
        if (e.data === YT.PlayerState.PLAYING) startProgress();
      }
    }
  });
}

function loadVideo() {
  const url = document.getElementById("urlInput").value.trim();
  let id = "";
  if (url.includes("v=")) id = url.split("v=")[1].split("&")[0];
  else if (url.includes("youtu.be/")) id = url.split("youtu.be/")[1].split("?")[0];
  if (!id) { alert("Неверная ссылка"); return; }
  videoId = id;
  player.loadVideoById(videoId);
  setStatus("Видео загружено. Нажмите ПРОБЕЛ для разметки.");
}

function togglePlay() {
  if (!playerReady) return;
  player.getPlayerState() === YT.PlayerState.PLAYING ? player.pauseVideo() : player.playVideo();
}
function seekRel(s) { if (playerReady) player.seekTo(Math.max(0, player.getCurrentTime() + s), true); }
function seekByClick(e) {
  if (!playerReady) return;
  player.seekTo((e.offsetX / document.getElementById("progressBar").offsetWidth) * player.getDuration(), true);
}
function changeSpeed(dir) {
  speedIdx = Math.max(0, Math.min(speeds.length - 1, speedIdx + dir));
  if (playerReady) player.setPlaybackRate(speeds[speedIdx]);
  document.getElementById("speedDisplay").textContent = speeds[speedIdx] + "x";
}
function startProgress() {
  if (progressInterval) clearInterval(progressInterval);
  progressInterval = setInterval(() => {
    if (!playerReady) return;
    const cur = player.getCurrentTime() || 0, dur = player.getDuration() || 1;
    document.getElementById("progressFill").style.width = (cur/dur*100) + "%";
    document.getElementById("timeDisplay").textContent = formatTime(cur) + "/" + formatTime(dur);
  }, 500);
}

// Разметка
function setAnchor() {
  if (!playerReady) return;
  anchorTime = Math.floor(player.getCurrentTime());
  player.seekTo(Math.max(0, anchorTime - 5), true);
  player.setPlaybackRate(0.5); speedIdx = 1;
  document.getElementById("speedDisplay").textContent = "0.5x";
  player.playVideo();
  currentStep = 0; selections = {};
  renderStep();
  setStatus("⏱ Якорь: " + formatTime(anchorTime));
}

function renderStep() {
  if (currentStep < 0 || currentStep >= STEPS.length) return;
  const step = STEPS[currentStep];
  for (let i = 0; i < STEPS.length; i++) {
    const d = document.getElementById("dot" + i);
    d.className = "step-dot" + (i < currentStep ? " done" : i === currentStep ? " active" : "");
  }
  document.getElementById("step-label").textContent = step.label;
  document.getElementById("backBtn").style.display = currentStep > 0 ? "inline-block" : "none";
  document.getElementById("saveBtn").style.display = "none";

  const container = document.getElementById("step-buttons");
  container.innerHTML = "";
  step.options.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "step-btn " + (opt.cls || "");
    if (selections[step.key] === opt.code) btn.classList.add("selected");
    btn.textContent = opt.label;
    btn.onclick = () => selectOption(step.key, opt.code, btn);
    container.appendChild(btn);
  });
  updateCodeDisplay();
}

function selectOption(key, code, btn) {
  document.querySelectorAll("#step-buttons .step-btn").forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected");
  selections[key] = code;
  updateCodeDisplay();
  setTimeout(() => {
    currentStep++;
    if (currentStep >= STEPS.length) {
      document.getElementById("step-buttons").innerHTML = "<span style='color:#27ae60;font-size:12px;'>✅ Готово! Нажмите СОХРАНИТЬ или Enter</span>";
      document.getElementById("saveBtn").style.display = "inline-block";
      document.getElementById("backBtn").style.display = "inline-block";
      for (let i = 0; i < STEPS.length; i++) document.getElementById("dot" + i).className = "step-dot done";
      document.getElementById("step-label").textContent = "Все шаги пройдены";
    } else {
      renderStep();
    }
  }, 220);
}

function goBack() {
  if (currentStep <= 0) return;
  // Если уже на финальном экране — вернуться к шагу 4
  if (currentStep >= STEPS.length) currentStep = STEPS.length - 1;
  else currentStep--;
  // Удалить выбор текущего шага
  delete selections[STEPS[currentStep].key];
  renderStep();
}

function updateCodeDisplay() {
  const f = selections.fighter || "", i = selections.initiative || "",
        w = selections.weapon || "", z = selections.zone || "", r = selections.result || "";
  const code = f + i + w + z;
  const pts = r ? (r === "-" ? " −" : r === "0" ? " ×" : " +" + r) : "";
  document.getElementById("currentCodeFull").textContent = (code || "—") + pts;
  const map = {A:"Атака",C:"Контра",S:"Встречный","1":"Передняя","2":"Задняя","3":"Рука","4":"Разворот",V:"Корпус",H:"Голова"};
  let parts = [];
  if (f) parts.push(f === "B" ? "🔵" : "🔴");
  [i,w,z].forEach(x => { if (x && map[x]) parts.push(map[x]); });
  if (r) parts.push(r==="-"?"Гам-джон":r==="0"?"Мимо":"+"+r+" балл(а)");
  document.getElementById("currentDesc").textContent = parts.join(" → ");
}

function saveEvent() {
  const keys = ["fighter","initiative","weapon","zone","result"];
  if (keys.some(k => !selections[k])) { setStatus("⚠️ Заполни все шаги!"); return; }
  const pts = selections.result === "-" ? -1 : parseInt(selections.result);
  const code = selections.fighter + selections.initiative + selections.weapon + selections.zone;
  events.push({
    id: Date.now(),
    fighter: selections.fighter === "B" ? "Blue" : "Red",
    time: anchorTime, code, points: pts,
    desc: document.getElementById("currentDesc").textContent,
    link: "https://www.youtube.com/watch?v=" + videoId + "&t=" + Math.max(0, anchorTime-3) + "s",
    comment: ""
  });
  renderEvents();
  // Сброс скорости к 1x
  player.setPlaybackRate(1.0); speedIdx = 3;
  document.getElementById("speedDisplay").textContent = "1x";
  resetTagging();
  setStatus("✅ Сохранено! Пробел — следующий эпизод.");
}

function resetTagging() {
  currentStep = -1; selections = {};
  document.getElementById("step-buttons").innerHTML = "";
  document.getElementById("currentCodeFull").textContent = "—";
  document.getElementById("currentDesc").textContent = "";
  document.getElementById("saveBtn").style.display = "none";
  document.getElementById("backBtn").style.display = "none";
  for (let i = 0; i < STEPS.length; i++) document.getElementById("dot" + i).className = "step-dot";
  document.getElementById("step-label").textContent = "Нажмите ЯКОРЬ или ПРОБЕЛ для начала";
}

function renderEvents() {
  const list = document.getElementById("eventsList");
  list.innerHTML = "";
  if (!events.length) { list.innerHTML = "<div style='color:#444;font-size:11px;text-align:center;margin-top:20px;'>Событий пока нет</div>"; document.getElementById("eventCount").textContent = "0"; return; }
  events.slice().reverse().forEach(ev => {
    const card = document.createElement("div");
    card.className = "event-card " + ev.fighter.toLowerCase();
    const icon = ev.fighter === "Blue" ? "🔵" : "🔴";
    const ptsLabel = ev.points === -1 ? "Гам-джон" : ev.points === 0 ? "Мимо" : "+" + ev.points;
    card.innerHTML = `<div class="etime">${formatTime(ev.time)}</div>
      <div class="ecode">${icon} ${ev.code} <span style="color:#aaa;font-size:11px;font-weight:normal;">${ptsLabel}</span></div>
      <div class="edesc">${ev.desc}</div>
      <a href="${ev.link}" target="_blank">▶ СМОТРЕТЬ ЭПИЗОД</a>
      <textarea placeholder="Заметка..." onchange="updateComment(${ev.id},this.value)">${ev.comment}</textarea>
      <button class="del-btn" onclick="deleteEvent(${ev.id})">✕</button>`;
    list.appendChild(card);
  });
  document.getElementById("eventCount").textContent = events.length;
}

function updateComment(id, val) { const ev = events.find(e => e.id===id); if (ev) ev.comment = val; }
function deleteEvent(id) { if (confirm("Удалить?")) { events = events.filter(e => e.id!==id); renderEvents(); } }

document.addEventListener("keydown", function(e) {
  if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
  if (e.code === "Space") { e.preventDefault(); setAnchor(); return; }
  if (e.code === "Enter") { e.preventDefault(); if (document.getElementById("saveBtn").style.display !== "none") saveEvent(); return; }
  if (e.code === "Escape") { e.preventDefault(); resetTagging(); return; }
  if (e.code === "Backspace") { e.preventDefault(); goBack(); return; }
  if (currentStep >= 0 && currentStep < STEPS.length) {
    const step = STEPS[currentStep], key = e.key.toUpperCase();
    const opt = step.options.find(o => o.code === key);
    if (opt) {
      e.preventDefault();
      const btns = document.querySelectorAll("#step-buttons .step-btn");
      const idx = step.options.findIndex(o => o.code === key);
      if (btns[idx]) selectOption(step.key, opt.code, btns[idx]);
    }
  }
});

function setStatus(m) { document.getElementById("statusMsg").textContent = m; }
function formatTime(s) { s=Math.floor(s); return Math.floor(s/60)+":"+String(s%60).padStart(2,"0"); }
function downloadJSON() {
  const blob = new Blob([JSON.stringify({videoId, total:events.length, events},null,2)],{type:"application/json"});
  const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "tkd_analysis.json"; a.click();
}
</script>
</body>
</html>
