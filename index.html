<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TKD Tagger v1.4 | Manual Mode</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #161625;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 15px;
      border-bottom: 2px solid #e94560;
    }
    header h1 { font-size: 16px; color: #e94560; text-transform: uppercase; letter-spacing: 2px; }
    #urlInput {
      flex: 1;
      padding: 8px 12px;
      border-radius: 4px;
      border: 1px solid #333;
      background: #000;
      color: #fff;
    }
    #loadBtn {
      padding: 8px 15px;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }

    .main { display: flex; flex: 1; overflow: hidden; }

    #left {
      flex: 2.5;
      display: flex;
      flex-direction: column;
      padding: 15px;
      gap: 10px;
    }
    #player-container {
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }

    #display-panel {
      display: flex;
      gap: 15px;
      background: #161625;
      padding: 15px;
      border-radius: 8px;
      border: 1px solid #333;
      align-items: center;
    }
    .display-box { flex: 1; }
    .display-label { font-size: 10px; color: #888; text-transform: uppercase; margin-bottom: 4px; }
    #currentFighter { font-size: 24px; font-weight: bold; }
    #currentFighter.blue { color: #3498db; }
    #currentFighter.red { color: #e74c3c; }
    #currentCode { font-size: 32px; font-weight: bold; color: #e94560; letter-spacing: 3px; }
    #statusMsg { font-size: 12px; color: #aaa; font-style: italic; }

    #controls-hint {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      background: #111;
      padding: 12px;
      border-radius: 8px;
      font-size: 11px;
    }
    .hint-group b { color: #e94560; display: block; margin-bottom: 4px; font-size: 10px; }
    .hint-item { margin-bottom: 2px; color: #ccc; }
    .hint-item span { color: #fff; background: #333; padding: 1px 4px; border-radius: 3px; font-family: monospace; }

    #right {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #111;
      border-left: 1px solid #222;
      min-width: 320px;
    }
    #rightHeader {
      padding: 15px;
      background: #161625;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #222;
    }
    #eventsList {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .event-card {
      background: #1a1a1a;
      border-radius: 6px;
      padding: 10px;
      border-left: 4px solid #444;
      position: relative;
    }
    .event-card.blue { border-left-color: #3498db; }
    .event-card.red { border-left-color: #e74c3c; }
    .event-card .time { position: absolute; top: 10px; right: 10px; font-size: 10px; color: #666; }
    .event-card .code { font-size: 16px; font-weight: bold; margin-bottom: 4px; }
    .event-card .desc { font-size: 11px; color: #aaa; margin-bottom: 8px; }
    .event-card a { font-size: 10px; color: #4a9eff; text-decoration: none; }
    .event-card textarea {
      width: 100%;
      background: #000;
      border: 1px solid #333;
      color: #ccc;
      font-size: 10px;
      padding: 5px;
      margin-top: 8px;
      border-radius: 4px;
    }
    .delete-btn {
      position: absolute;
      bottom: 10px;
      right: 10px;
      color: #ff4d4d;
      cursor: pointer;
      font-size: 10px;
      text-decoration: underline;
    }

    #actions {
      padding: 10px;
      display: flex;
      gap: 10px;
    }
    .action-btn {
      flex: 1;
      padding: 10px;
      border-radius: 4px;
      border: 1px solid #e94560;
      background: transparent;
      color: #e94560;
      font-weight: bold;
      cursor: pointer;
      font-size: 12px;
    }
    .action-btn:hover { background: #e94560; color: #fff; }
  </style>
</head>
<body>

<header>
  <h1>⚡ TKD Tagger v1.4 | Manual Mode</h1>
  <input type="text" id="urlInput" placeholder="Вставьте ссылку на YouTube">
  <button id="loadBtn" onclick="loadVideo()">ЗАГРУЗИТЬ</button>
</header>

<div class="main">
  <div id="left">
    <div id="player-container"><div id="player"></div></div>

    <div id="display-panel">
      <div class="display-box" style="max-width: 120px;">
        <div class="display-label">Боец</div>
        <div id="currentFighter">_</div>
      </div>
      <div class="display-box">
        <div class="display-label">Код действия</div>
        <div id="currentCode">_</div>
      </div>
      <div id="statusMsg">Нажмите SPACE для начала разметки эпизода</div>
    </div>

    <div id="controls-hint">
      <div class="hint-group">
        <b>БОЕЦ</b>
        <div class="hint-item"><span>B</span> Blue</div>
        <div class="hint-item"><span>R</span> Red</div>
      </div>
      <div class="hint-group">
        <b>ИНИЦИАТИВА</b>
        <div class="hint-item"><span>A</span> Атака</div>
        <div class="hint-item"><span>C</span> Контра</div>
        <div class="hint-item"><span>S</span> Встречный</div>
      </div>
      <div class="hint-group">
        <b>ОРУЖИЕ</b>
        <div class="hint-item"><span>1</span> Передняя</div>
        <div class="hint-item"><span>2</span> Задняя</div>
        <div class="hint-item"><span>3</span> Рука</div>
        <div class="hint-item"><span>4</span> Разворот</div>
      </div>
      <div class="hint-group">
        <b>ЗОНА</b>
        <div class="hint-item"><span>V</span> Жилет</div>
        <div class="hint-item"><span>H</span> Голова</div>
      </div>
      <div class="hint-group">
        <b>ЗАВЕРШЕНИЕ</b>
        <div class="hint-item"><span>0-9</span> Баллы</div>
        <div class="hint-item"><span>-</span> Гам-джон</div>
        <div class="hint-item"><span>Enter</span> СОХРАНИТЬ</div>
      </div>
    </div>
  </div>

  <div id="right">
    <div id="rightHeader">
      <h3>СОБЫТИЯ</h3>
      <span id="eventCount" style="color: #e94560; font-weight: bold;">0</span>
    </div>
    <div id="eventsList"></div>
    <div id="actions">
      <button class="action-btn" onclick="downloadJSON()">СКАЧАТЬ JSON</button>
    </div>
  </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
  let player, events = [], currentCode = "", anchorTime = 0, videoId = "", isTagging = false, currentFighter = "";

  function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', { height: '100%', width: '100%', videoId: '', playerVars: { 'playsinline': 1, 'rel': 0, 'modestbranding': 1 } });
  }

  function loadVideo() {
    const url = document.getElementById("urlInput").value.trim();
    let id = url.includes("v=") ? url.split("v=")[1].split("&")[0] : (url.includes("youtu.be/") ? url.split("youtu.be/")[1].split("?")[0] : "");
    if (!id) return alert("Неверная ссылка на YouTube");
    videoId = id; player.loadVideoById(videoId);
    setStatus("Видео загружено. Используйте SPACE для разметки.");
  }

  document.addEventListener("keydown", function(e) {
    if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;

    if (e.code === "Space") {
      e.preventDefault();
      anchorTime = Math.floor(player.getCurrentTime());
      player.seekTo(Math.max(0, anchorTime - 5), true);
      player.setPlaybackRate(0.5);
      isTagging = true; currentCode = ""; currentFighter = "";
      updateUI();
      setStatus("Эпизод на " + formatTime(anchorTime) + ". Выберите бойца (B/R)...");
      return;
    }

    if (e.code === "Escape") {
      isTagging = false; currentCode = ""; currentFighter = "";
      player.setPlaybackRate(1.0);
      updateUI();
      setStatus("Сброшено. Нажмите SPACE для нового якоря.");
      return;
    }

    if (isTagging) {
      const key = e.key.toUpperCase();

      if (key === "B") { currentFighter = "Blue"; updateUI(); setStatus("СИНИЙ: Вводите тактику и баллы..."); return; }
      if (key === "R") { currentFighter = "Red"; updateUI(); setStatus("КРАСНЫЙ: Вводите тактику и баллы..."); return; }

      if (!currentFighter) return;

      if ("ACS1234VH0123456789-".includes(key)) {
        currentCode += key;
        updateUI();
      }

      if (e.code === "Enter") {
        saveEvent();
      }
    }
  });

  function saveEvent() {
    // Извлекаем баллы из кода
    let points = 0;
    if (currentCode.includes("-")) {
      points = -1;
    } else {
      let digits = currentCode.match(/\d+/g);
      if (digits) points = parseInt(digits.join(""));
    }

    const event = {
      id: Date.now(),
      fighter: currentFighter,
      time: anchorTime,
      code: currentCode,
      points: points,
      desc: decode(currentCode, points),
      link: "https://www.youtube.com/watch?v=" + videoId + "&t=" + Math.max(0, anchorTime - 3) + "s",
      comment: ""
    };
    events.push(event);
    renderEvents();
    player.setPlaybackRate(1.0);
    isTagging = false;
    updateUI();
    setStatus("✅ Сохранено. Нажмите SPACE для следующего эпизода.");
  }

  function decode(code, pts) {
    const m = { "A":"Атака", "C":"Контра", "S":"Встречный", "1":"Передняя", "2":"Задняя", "3":"Рука", "4":"Разворот", "V":"Корпус", "H":"Голова" };
    let res = [];
    for(let i=0; i<code.length; i++) {
      let char = code.substring(i, i+1);
      if (m[char]) res.push(m[char]);
    }
    if (code.includes("-")) res.push("Гам-джон");
    return res.join(" → ") + (pts !== 0 ? " [" + pts + "]" : " [Мимо]");
  }

  function renderEvents() {
    const list = document.getElementById("eventsList");
    list.innerHTML = "";
    events.slice().reverse().forEach(ev => {
      const card = document.createElement("div");
      card.className = "event-card " + ev.fighter.toLowerCase();
      card.innerHTML = `
        <div class="time">${formatTime(ev.time)}</div>
        <div class="code">${ev.fighter[0]}: ${ev.code}</div>
        <div class="desc">${ev.desc}</div>
        <a href="${ev.link}" target="_blank">▶ СМОТРЕТЬ ЭПИЗОД</a>
        <textarea placeholder="Заметка..." onchange="updateComment(${ev.id}, this.value)">${ev.comment}</textarea>
        <div class="delete-btn" onclick="deleteEvent(${ev.id})">удалить</div>
      `;
      list.appendChild(card);
    });
    document.getElementById("eventCount").textContent = events.length;
  }

  function updateComment(id, val) {
    let ev = events.find(e => e.id === id);
    if (ev) ev.comment = val;
  }

  function deleteEvent(id) {
    if (confirm("Удалить это событие?")) {
      events = events.filter(e => e.id !== id);
      renderEvents();
    }
  }

  function updateUI() {
    const f = document.getElementById("currentFighter");
    f.textContent = currentFighter || "_";
    f.className = currentFighter.toLowerCase();
    document.getElementById("currentCode").textContent = currentCode || "_";
  }

  function setStatus(m) { document.getElementById("statusMsg").textContent = m; }
  function formatTime(s) { return Math.floor(s/60) + ":" + String(s%60).padStart(2, "0"); }

  function downloadJSON() {
    const blob = new Blob([JSON.stringify({videoId, total: events.length, events}, null, 2)], {type : 'application/json'});
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "tkd_analysis.json"; a.click();
  }
</script>
</body>
</html>
