<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TKD Tagger v1.6 | Manual Mode</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #0a0a0a; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    header { background: #161625; padding: 8px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 2px solid #e94560; flex-shrink: 0; }
    header h1 { font-size: 15px; color: #e94560; text-transform: uppercase; letter-spacing: 2px; white-space: nowrap; }
    #urlInput { flex: 1; padding: 7px 12px; border-radius: 4px; border: 1px solid #333; background: #000; color: #fff; font-size: 13px; }
    #loadBtn { padding: 7px 15px; background: #e94560; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; white-space: nowrap; }

    .main { display: flex; flex: 1; overflow: hidden; }

    #left { flex: 2.5; display: flex; flex-direction: column; padding: 10px; gap: 8px; overflow: hidden; }

    #player-wrapper { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 8px; overflow: hidden; flex-shrink: 0; }
    #player { width: 100%; height: 100%; }
    /* Прозрачный оверлей только над центром чтобы не перехватывать контролы YouTube */
    #player-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 40px; cursor: default; }

    /* Кастомные контролы */
    #custom-controls { display: flex; align-items: center; gap: 8px; background: #161625; padding: 8px 12px; border-radius: 8px; flex-shrink: 0; }
    .ctrl-btn { background: #2a2a3a; border: 1px solid #444; color: #fff; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .ctrl-btn:hover { background: #e94560; border-color: #e94560; }
    .ctrl-btn.active { background: #e94560; border-color: #e94560; }
    #progressBar { flex: 1; height: 6px; background: #333; border-radius: 3px; cursor: pointer; position: relative; }
    #progressFill { height: 100%; background: #e94560; border-radius: 3px; width: 0%; pointer-events: none; }
    #timeDisplay { font-size: 11px; color: #aaa; white-space: nowrap; min-width: 80px; text-align: center; }
    #speedDisplay { font-size: 11px; color: #e94560; font-weight: bold; min-width: 35px; text-align: center; }

    /* Пошаговый ввод */
    #tagging-panel { background: #161625; border-radius: 8px; padding: 10px 15px; flex-shrink: 0; }
    #step-indicator { display: flex; gap: 6px; margin-bottom: 10px; align-items: center; }
    .step-dot { width: 8px; height: 8px; border-radius: 50%; background: #333; }
    .step-dot.active { background: #e94560; }
    .step-dot.done { background: #27ae60; }
    #step-label { font-size: 11px; color: #888; margin-left: 8px; }

    #step-buttons { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .step-btn { padding: 7px 14px; border-radius: 6px; border: 2px solid #444; background: #1a1a2e; color: #ccc; cursor: pointer; font-size: 13px; font-weight: bold; transition: all 0.15s; }
    .step-btn:hover { border-color: #e94560; color: #fff; }
    .step-btn.selected { border-color: #27ae60; background: #1a3a2a; color: #27ae60; }
    .step-btn.fighter-b { border-color: #3498db; color: #3498db; }
    .step-btn.fighter-b:hover, .step-btn.fighter-b.selected { background: #1a2a3a; border-color: #3498db; color: #fff; }
    .step-btn.fighter-r { border-color: #e74c3c; color: #e74c3c; }
    .step-btn.fighter-r:hover, .step-btn.fighter-r.selected { background: #3a1a1a; border-color: #e74c3c; color: #fff; }

    #code-display { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
    #currentCodeFull { font-size: 20px; font-weight: bold; color: #e94560; letter-spacing: 2px; min-width: 120px; }
    #currentDesc { font-size: 11px; color: #888; flex: 1; }
    #saveBtn { padding: 7px 18px; background: #27ae60; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 13px; display: none; }
    #saveBtn:hover { background: #2ecc71; }
    #resetBtn { padding: 7px 12px; background: transparent; color: #888; border: 1px solid #444; border-radius: 4px; cursor: pointer; font-size: 12px; }
    #resetBtn:hover { color: #e94560; border-color: #e94560; }
    #statusMsg { font-size: 11px; color: #e94560; font-style: italic; }

    /* Правая панель */
    #right { flex: 1; display: flex; flex-direction: column; background: #111; border-left: 1px solid #222; min-width: 300px; }
    #rightHeader { padding: 12px 15px; background: #161625; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; flex-shrink: 0; }
    #eventsList { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
    .event-card { background: #1a1a1a; border-radius: 6px; padding: 10px; border-left: 4px solid #444; position: relative; }
    .event-card.blue { border-left-color: #3498db; }
    .event-card.red { border-left-color: #e74c3c; }
    .event-card .etime { position: absolute; top: 8px; right: 8px; font-size: 10px; color: #666; }
    .event-card .ecode { font-size: 15px; font-weight: bold; margin-bottom: 3px; }
    .event-card .edesc { font-size: 11px; color: #aaa; margin-bottom: 6px; }
    .event-card a { font-size: 11px; color: #4a9eff; text-decoration: none; }
    .event-card a:hover { text-decoration: underline; }
    .event-card textarea { width: 100%; background: #000; border: 1px solid #333; color: #ccc; font-size: 10px; padding: 4px; margin-top: 6px; border-radius: 3px; resize: none; height: 40px; }
    .del-btn { position: absolute; bottom: 8px; right: 8px; color: #ff4d4d; cursor: pointer; font-size: 10px; background: none; border: none; }
    #actions { padding: 10px; flex-shrink: 0; }
    .action-btn { width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #e94560; background: transparent; color: #e94560; font-weight: bold; cursor: pointer; font-size: 12px; }
    .action-btn:hover { background: #e94560; color: #fff; }
  </style>
</head>
<body>

<header>
  <h1>⚡ TKD Tagger v1.6</h1>
  <input type="text" id="urlInput" placeholder="Вставьте ссылку на YouTube">
  <button id="loadBtn" onclick="loadVideo()">ЗАГРУЗИТЬ</button>
</header>

<div class="main">
  <div id="left">

    <!-- Плеер -->
    <div id="player-wrapper">
      <div id="player"></div>
      <div id="player-overlay"></div>
    </div>

    <!-- Кастомные контролы -->
    <div id="custom-controls">
      <button class="ctrl-btn" id="playPauseBtn" onclick="togglePlay()">▶ Пуск</button>
      <button class="ctrl-btn" onclick="seekRel(-10)">⏪ 10с</button>
      <button class="ctrl-btn" onclick="seekRel(-3)">◀ 3с</button>
      <button class="ctrl-btn" onclick="seekRel(3)">3с ▶</button>
      <button class="ctrl-btn" onclick="seekRel(10)">10с ⏩</button>
      <div id="progressBar" onclick="seekByClick(event)"><div id="progressFill"></div></div>
      <div id="timeDisplay">0:00 / 0:00</div>
      <button class="ctrl-btn" onclick="changeSpeed(-1)">🐢</button>
      <div id="speedDisplay">1x</div>
      <button class="ctrl-btn" onclick="changeSpeed(1)">🐇</button>
      <button class="ctrl-btn" id="anchorBtn" onclick="setAnchor()" title="Пробел">📍 ЯКОРЬ</button>
    </div>

    <!-- Пошаговый ввод -->
    <div id="tagging-panel">
      <div id="step-indicator">
        <div class="step-dot" id="dot0"></div>
        <div class="step-dot" id="dot1"></div>
        <div class="step-dot" id="dot2"></div>
        <div class="step-dot" id="dot3"></div>
        <div class="step-dot" id="dot4"></div>
        <span id="step-label">Нажмите ЯКОРЬ или ПРОБЕЛ для начала разметки</span>
      </div>
      <div id="step-buttons"></div>
      <div id="code-display">
        <div id="currentCodeFull">—</div>
        <div id="currentDesc"></div>
        <button id="saveBtn" onclick="saveEvent()">✅ СОХРАНИТЬ</button>
        <button id="resetBtn" onclick="resetTagging()">✖ СБРОС</button>
      </div>
      <div id="statusMsg"></div>
    </div>

  </div>

  <div id="right">
    <div id="rightHeader">
      <h3 style="font-size:14px;">СОБЫТИЯ</h3>
      <span id="eventCount" style="color:#e94560;font-weight:bold;font-size:18px;">0</span>
    </div>
    <div id="eventsList"><div style="color:#555;font-size:12px;text-align:center;margin-top:30px;">Событий пока нет</div></div>
    <div id="actions"><button class="action-btn" onclick="downloadJSON()">⬇ СКАЧАТЬ JSON</button></div>
  </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
// ===== СОСТОЯНИЕ =====
let player, playerReady = false, videoId = "", events = [];
let anchorTime = 0;
let speeds = [0.25, 0.5, 0.75, 1, 1.25, 1.5, 2];
let speedIdx = 3; // 1x
let progressInterval = null;

// Пошаговый ввод
const STEPS = [
  { key: "fighter", label: "Шаг 1: Выбери бойца", options: [
    { code: "B", label: "🔵 Blue", cls: "fighter-b" },
    { code: "R", label: "🔴 Red", cls: "fighter-r" }
  ]},
  { key: "initiative", label: "Шаг 2: Инициатива", options: [
    { code: "A", label: "A — Атака" },
    { code: "C", label: "C — Контра" },
    { code: "S", label: "S — Встречный" }
  ]},
  { key: "weapon", label: "Шаг 3: Оружие", options: [
    { code: "1", label: "1 — Передняя" },
    { code: "2", label: "2 — Задняя" },
    { code: "3", label: "3 — Рука" },
    { code: "4", label: "4 — Разворот" }
  ]},
  { key: "zone", label: "Шаг 4: Зона", options: [
    { code: "V", label: "V — Корпус" },
    { code: "H", label: "H — Голова" }
  ]},
  { key: "result", label: "Шаг 5: Результат", options: [
    { code: "1", label: "1 балл" },
    { code: "2", label: "2 балла" },
    { code: "3", label: "3 балла" },
    { code: "4", label: "4 балла" },
    { code: "0", label: "0 — Мимо" },
    { code: "-", label: "— Гам-джон" }
  ]}
];

let currentStep = -1; // -1 = не активен
let selections = {}; // { fighter, initiative, weapon, zone, result }

// ===== YOUTUBE API =====
function onYouTubeIframeAPIReady() {
  player = new YT.Player("player", {
    height: "100%", width: "100%", videoId: "",
    playerVars: { playsinline: 1, rel: 0, modestbranding: 1, controls: 0 },
    events: {
      onReady: function() { playerReady = true; },
      onStateChange: function(e) {
        if (e.data === YT.PlayerState.PLAYING) {
          document.getElementById("playPauseBtn").textContent = "⏸ Пауза";
          startProgress();
        } else {
          document.getElementById("playPauseBtn").textContent = "▶ Пуск";
        }
      }
    }
  });
}

function loadVideo() {
  const url = document.getElementById("urlInput").value.trim();
  let id = "";
  if (url.includes("v=")) id = url.split("v=")[1].split("&")[0];
  else if (url.includes("youtu.be/")) id = url.split("youtu.be/")[1].split("?")[0];
  if (!id) { alert("Неверная ссылка"); return; }
  videoId = id;
  player.loadVideoById(videoId);
  setStatus("Видео загружено. Нажмите ПРОБЕЛ или кнопку ЯКОРЬ для разметки.");
}

// ===== КОНТРОЛЫ =====
function togglePlay() {
  if (!playerReady) return;
  const state = player.getPlayerState();
  if (state === YT.PlayerState.PLAYING) player.pauseVideo();
  else player.playVideo();
}

function seekRel(sec) {
  if (!playerReady) return;
  player.seekTo(Math.max(0, player.getCurrentTime() + sec), true);
}

function seekByClick(e) {
  if (!playerReady) return;
  const bar = document.getElementById("progressBar");
  const ratio = e.offsetX / bar.offsetWidth;
  player.seekTo(ratio * player.getDuration(), true);
}

function changeSpeed(dir) {
  speedIdx = Math.max(0, Math.min(speeds.length - 1, speedIdx + dir));
  if (playerReady) player.setPlaybackRate(speeds[speedIdx]);
  document.getElementById("speedDisplay").textContent = speeds[speedIdx] + "x";
}

function startProgress() {
  if (progressInterval) clearInterval(progressInterval);
  progressInterval = setInterval(() => {
    if (!playerReady) return;
    const cur = player.getCurrentTime() || 0;
    const dur = player.getDuration() || 1;
    document.getElementById("progressFill").style.width = (cur / dur * 100) + "%";
    document.getElementById("timeDisplay").textContent = formatTime(cur) + " / " + formatTime(dur);
  }, 500);
}

// ===== РАЗМЕТКА =====
function setAnchor() {
  if (!playerReady) return;
  anchorTime = Math.floor(player.getCurrentTime());
  player.seekTo(Math.max(0, anchorTime - 5), true);
  player.setPlaybackRate(0.5);
  speedIdx = 1;
  document.getElementById("speedDisplay").textContent = "0.5x";
  player.playVideo();
  currentStep = 0;
  selections = {};
  renderStep();
  setStatus("⏱ Якорь: " + formatTime(anchorTime));
}

function renderStep() {
  if (currentStep < 0 || currentStep >= STEPS.length) return;
  const step = STEPS[currentStep];

  // Обновить точки
  for (let i = 0; i < STEPS.length; i++) {
    const dot = document.getElementById("dot" + i);
    if (i < currentStep) dot.className = "step-dot done";
    else if (i === currentStep) dot.className = "step-dot active";
    else dot.className = "step-dot";
  }
  document.getElementById("step-label").textContent = step.label;

  // Кнопки
  const container = document.getElementById("step-buttons");
  container.innerHTML = "";
  step.options.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "step-btn " + (opt.cls || "");
    btn.textContent = opt.label;
    btn.onclick = () => selectOption(step.key, opt.code, btn);
    container.appendChild(btn);
  });

  updateCodeDisplay();
}

function selectOption(key, code, btn) {
  // Снять выделение с других кнопок этого шага
  document.querySelectorAll("#step-buttons .step-btn").forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected");
  selections[key] = code;
  updateCodeDisplay();

  // Автопереход к следующему шагу через 300мс
  setTimeout(() => {
    currentStep++;
    if (currentStep >= STEPS.length) {
      // Все шаги пройдены — показать кнопку сохранить
      document.getElementById("step-buttons").innerHTML = "<span style='color:#27ae60;font-size:13px;'>✅ Все поля заполнены! Нажмите СОХРАНИТЬ или Enter</span>";
      document.getElementById("saveBtn").style.display = "inline-block";
      for (let i = 0; i < STEPS.length; i++) document.getElementById("dot" + i).className = "step-dot done";
      document.getElementById("step-label").textContent = "Готово!";
    } else {
      renderStep();
    }
  }, 250);
}

function updateCodeDisplay() {
  const f = selections.fighter || "";
  const i = selections.initiative || "";
  const w = selections.weapon || "";
  const z = selections.zone || "";
  const r = selections.result || "";
  const code = (f ? f : "") + (i || "") + (w || "") + (z || "") + (r ? "+" + r : "");
  document.getElementById("currentCodeFull").textContent = code || "—";

  // Описание
  const map = { "A":"Атака","C":"Контра","S":"Встречный","1":"Передняя","2":"Задняя","3":"Рука","4":"Разворот","V":"Корпус","H":"Голова" };
  let parts = [];
  if (f) parts.push(f === "B" ? "🔵 Blue" : "🔴 Red");
  if (i && map[i]) parts.push(map[i]);
  if (w && map[w]) parts.push(map[w]);
  if (z && map[z]) parts.push(map[z]);
  if (r) parts.push(r === "-" ? "Гам-джон" : r === "0" ? "Мимо" : r + " балл(а)");
  document.getElementById("currentDesc").textContent = parts.join(" → ");
}

function saveEvent() {
  if (!selections.fighter || !selections.initiative || !selections.weapon || !selections.zone || !selections.result) {
    setStatus("⚠️ Заполни все шаги!"); return;
  }
  const pts = selections.result === "-" ? -1 : parseInt(selections.result);
  const code = selections.fighter + selections.initiative + selections.weapon + selections.zone;
  const event = {
    id: Date.now(),
    fighter: selections.fighter === "B" ? "Blue" : "Red",
    time: anchorTime,
    code: code,
    points: pts,
    desc: document.getElementById("currentDesc").textContent,
    link: "https://www.youtube.com/watch?v=" + videoId + "&t=" + Math.max(0, anchorTime - 3) + "s",
    comment: ""
  };
  events.push(event);
  renderEvents();
  player.setPlaybackRate(1.0);
  speedIdx = 3;
  document.getElementById("speedDisplay").textContent = "1x";
  resetTagging();
  setStatus("✅ Сохранено! Нажмите ПРОБЕЛ для следующего эпизода.");
}

function resetTagging() {
  currentStep = -1;
  selections = {};
  document.getElementById("step-buttons").innerHTML = "";
  document.getElementById("currentCodeFull").textContent = "—";
  document.getElementById("currentDesc").textContent = "";
  document.getElementById("saveBtn").style.display = "none";
  for (let i = 0; i < STEPS.length; i++) document.getElementById("dot" + i).className = "step-dot";
  document.getElementById("step-label").textContent = "Нажмите ЯКОРЬ или ПРОБЕЛ для начала разметки";
}

// ===== СОБЫТИЯ =====
function renderEvents() {
  const list = document.getElementById("eventsList");
  list.innerHTML = "";
  if (events.length === 0) {
    list.innerHTML = "<div style='color:#555;font-size:12px;text-align:center;margin-top:30px;'>Событий пока нет</div>";
    document.getElementById("eventCount").textContent = "0";
    return;
  }
  events.slice().reverse().forEach(ev => {
    const card = document.createElement("div");
    card.className = "event-card " + ev.fighter.toLowerCase();
    const icon = ev.fighter === "Blue" ? "🔵" : "🔴";
    const ptsLabel = ev.points === -1 ? "Гам-джон" : ev.points === 0 ? "Мимо" : "+" + ev.points + " балл(а)";
    card.innerHTML = `
      <div class="etime">${formatTime(ev.time)}</div>
      <div class="ecode">${icon} ${ev.code} <span style="color:#aaa;font-size:12px;font-weight:normal;">${ptsLabel}</span></div>
      <div class="edesc">${ev.desc}</div>
      <a href="${ev.link}" target="_blank">▶ СМОТРЕТЬ ЭПИЗОД</a>
      <textarea placeholder="Заметка..." onchange="updateComment(${ev.id}, this.value)">${ev.comment}</textarea>
      <button class="del-btn" onclick="deleteEvent(${ev.id})">удалить</button>
    `;
    list.appendChild(card);
  });
  document.getElementById("eventCount").textContent = events.length;
}

function updateComment(id, val) { let ev = events.find(e => e.id === id); if (ev) ev.comment = val; }
function deleteEvent(id) { if (confirm("Удалить?")) { events = events.filter(e => e.id !== id); renderEvents(); } }

// ===== КЛАВИАТУРА =====
document.addEventListener("keydown", function(e) {
  if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
  if (e.code === "Space") { e.preventDefault(); setAnchor(); return; }
  if (e.code === "Enter") { e.preventDefault(); if (document.getElementById("saveBtn").style.display !== "none") saveEvent(); return; }
  if (e.code === "Escape") { e.preventDefault(); resetTagging(); return; }
  // Горячие клавиши для текущего шага
  if (currentStep >= 0 && currentStep < STEPS.length) {
    const step = STEPS[currentStep];
    const key = e.key.toUpperCase();
    const opt = step.options.find(o => o.code === key);
    if (opt) {
      e.preventDefault();
      const btns = document.querySelectorAll("#step-buttons .step-btn");
      btns.forEach((btn, idx) => { if (step.options[idx] && step.options[idx].code === key) selectOption(step.key, opt.code, btn); });
    }
  }
});

// ===== УТИЛИТЫ =====
function setStatus(m) { document.getElementById("statusMsg").textContent = m; }
function formatTime(s) { s = Math.floor(s); return Math.floor(s/60) + ":" + String(s%60).padStart(2,"0"); }
function downloadJSON() {
  const blob = new Blob([JSON.stringify({videoId, total: events.length, events}, null, 2)], {type:"application/json"});
  const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "tkd_analysis.json"; a.click();
}
</script>
</body>
</html>
