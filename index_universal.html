<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TKD Tagger Universal v3.0</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red: #e94560; --blue: #3a8fd1; --green: #27ae60;
    --bg: #0d0d14; --bg2: #13131f; --bg3: #1a1a2e;
    --border: #252535; --text: #d0d0e0; --muted: #555570;
  }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; overflow-x: hidden; }

  header {
    height: 60px; background: var(--bg2); border-bottom: 2px solid var(--red);
    display: flex; align-items: center; gap: 15px; padding: 0 20px; position: sticky; top: 0; z-index: 100;
  }
  .logo { font-size: 18px; font-weight: 900; color: #fff; }
  .logo span { color: var(--red); }
  #urlInput {
    flex: 1; background: #000; border: 1px solid var(--border);
    border-radius: 6px; padding: 10px; color: #fff; font-size: 14px; outline: none;
  }
  #loadBtn { padding: 10px 20px; background: var(--red); color: #fff; border: none; border-radius: 6px; font-weight: 800; cursor: pointer; }

  /* GRID SYSTEM */
  .main-container { display: grid; grid-template-columns: 1fr; gap: 0; }

  @media (min-width: 1024px) {
    .main-container { grid-template-columns: 65% 35%; height: calc(100vh - 60px); }
    #left-col { overflow-y: auto; border-right: 1px solid var(--border); padding: 20px; }
    #right-col { overflow-y: auto; padding: 20px; background: var(--bg2); }
  }

  #player-wrap { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 8px; overflow: hidden; margin-bottom: 15px; }
  #player { width: 100%; height: 100%; }

  /* CONTROLS */
  .controls-box { background: var(--bg2); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid var(--border); }
  .btn-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 15px; }
  .cbtn {
    background: var(--bg3); border: 1px solid var(--border); color: var(--text);
    padding: 15px 5px; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; transition: 0.2s;
  }
  .cbtn:hover { background: var(--border); color: #fff; }

  .speed-row { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
  .spd-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 12px 20px; border-radius: 8px; font-weight: 800; cursor: pointer; }
  #speedDisp { flex: 1; text-align: center; font-size: 18px; font-weight: 900; color: var(--red); background: var(--bg3); padding: 10px; border-radius: 8px; }

  #progress-container { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
  #progressWrap { flex: 1; height: 16px; background: var(--border); border-radius: 8px; cursor: pointer; position: relative; }
  #progressFill { height: 100%; background: var(--red); border-radius: 8px; width: 0%; pointer-events: none; }
  #timeDisp { font-family: monospace; font-size: 12px; color: var(--muted); min-width: 85px; text-align: right; }

  #anchorBtn {
    background: var(--red); color: #fff; font-size: 18px; font-weight: 900;
    padding: 20px; border-radius: 12px; border: none; width: 100%; cursor: pointer;
    box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3); transition: 0.2s;
  }
  #anchorBtn:active { transform: scale(0.98); }

  /* TAG PANEL */
  #tag-panel { background: var(--bg3); border-radius: 12px; padding: 20px; border: 1px solid var(--border); min-height: 300px; }
  .step-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  #stepLabel { font-size: 20px; font-weight: 900; color: var(--red); }
  #backBtn { padding: 10px 20px; background: var(--bg2); border: 1px solid var(--border); color: var(--text); border-radius: 8px; cursor: pointer; font-weight: 700; }

  #step-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .sbtn {
    padding: 25px 15px; border-radius: 12px; border: 2px solid var(--border);
    background: var(--bg2); color: var(--text); font-size: 18px; font-weight: 800; cursor: pointer; transition: 0.2s;
  }
  .sbtn:hover { border-color: var(--muted); }
  .sbtn.sel-b { border-color: var(--blue); color: var(--blue); background: rgba(58,143,209,0.1); }
  .sbtn.sel-r { border-color: var(--red); color: var(--red); background: rgba(233,69,96,0.1); }

  .code-preview {
    display: flex; align-items: center; justify-content: space-between;
    background: #000; padding: 20px; border-radius: 12px; border: 1px solid var(--border);
  }
  #codeDisp { font-size: 32px; font-weight: 900; color: var(--red); letter-spacing: 4px; }
  #saveBtn { padding: 15px 30px; background: var(--green); color: #fff; border: none; border-radius: 8px; font-weight: 900; font-size: 16px; cursor: pointer; }

  /* EVENTS LIST */
  #right-col h2 { font-size: 22px; font-weight: 900; margin-bottom: 20px; display: flex; justify-content: space-between; }
  #evCount { color: var(--red); }
  .ecard { background: var(--bg3); border-radius: 12px; padding: 15px; margin-bottom: 12px; border-left: 6px solid var(--border); position: relative; }
  .ecard.blue { border-left-color: var(--blue); }
  .ecard.red { border-left-color: var(--red); }
  .ecard-top { display: flex; justify-content: space-between; font-size: 18px; font-weight: 900; margin-bottom: 10px; }
  .ecard-link { color: var(--blue); text-decoration: none; font-weight: 700; font-size: 14px; }
  .del-btn { position: absolute; top: 15px; right: 15px; background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; }

  #dlBtn { width: 100%; padding: 20px; background: var(--bg); border: 2px solid var(--border); color: #fff; font-weight: 800; border-radius: 12px; cursor: pointer; margin-top: 20px; }
</style>
</head>
<body>

<header>
  <div class="logo">TKD <span>V3.0</span></div>
  <input type="text" id="urlInput" placeholder="Вставьте ссылку на YouTube (например, https://youtu.be/...)">
  <button id="loadBtn" onclick="loadVideo()">ЗАГРУЗИТЬ</button>
</header>

<div class="main-container">
  <div id="left-col">
    <div id="player-wrap">
      <div id="player"></div>
    </div>

    <div class="controls-box">
      <div class="btn-row">
        <button class="cbtn" id="playBtn" onclick="togglePlay()">ПАУЗА</button>
        <button class="cbtn" onclick="seekRel(-10)">-10с</button>
        <button class="cbtn" onclick="seekRel(-3)">-3с</button>
        <button class="cbtn" onclick="seekRel(3)">+3с</button>
        <button class="cbtn" onclick="seekRel(10)">+10с</button>
      </div>

      <div class="speed-row">
        <button class="spd-btn" onclick="chSpeed(-1)">МЕДЛЕННЕЕ</button>
        <div id="speedDisp">1x</div>
        <button class="spd-btn" onclick="chSpeed(1)">БЫСТРЕЕ</button>
      </div>

      <div id="progress-container">
        <div id="progressWrap" onclick="seekClick(event)">
          <div id="progressFill"></div>
        </div>
        <div id="timeDisp">0:00 / 0:00</div>
      </div>

      <button id="anchorBtn" onclick="setAnchor()">📍 ФИКСИРОВАТЬ МОМЕНТ (ЯКОРЬ)</button>
    </div>

    <div id="tag-panel">
      <div class="step-header">
        <span id="stepLabel">Ожидание события...</span>
        <button id="backBtn" onclick="goBack()" style="display:none">◀ НАЗАД</button>
      </div>
      <div id="step-btns"></div>
      <div class="code-preview">
        <div id="codeDisp">—</div>
        <button id="saveBtn" onclick="saveEvent()" style="display:none">СОХРАНИТЬ СОБЫТИЕ</button>
      </div>
    </div>
  </div>

  <div id="right-col">
    <h2>СОБЫТИЯ <span id="evCount">0</span></h2>
    <div id="events-list"></div>
    <button id="dlBtn" onclick="dlJSON()">СКАЧАТЬ ОТЧЕТ (JSON)</button>
  </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
let player, ready=false, vidId="", events=[], anchorTime=0, curStep=-1, sel={}, progTimer=null;
const SPEEDS=[0.25,0.5,0.75,1,1.25,1.5,2];
let spdIdx=3;

const STEPS=[
  {key:"fighter",label:"КТО УДАРИЛ?",opts:[{code:"B",label:"🔵 СИНИЙ",cls:"sel-b"},{code:"R",label:"🔴 КРАСНЫЙ",cls:"sel-r"}]},
  {key:"init",label:"ТИП АТАКИ",opts:[{code:"A",label:"АТАКА"},{code:"C",label:"КОНТРА"},{code:"S",label:"ВСТРЕЧНЫЙ"}]},
  {key:"weapon",label:"ЧЕМ УДАРИЛ?",opts:[{code:"1",label:"ПЕРЕДНЯЯ"},{code:"2",label:"ЗАДНЯЯ"},{code:"3",label:"РУКА"},{code:"4",label:"РАЗВОРОТ"}]},
  {key:"zone",label:"КУДА?",opts:[{code:"V",label:"КОРПУС"},{code:"H",label:"ГОЛОВА"}]},
  {key:"result",label:"РЕЗУЛЬТАТ",opts:[{code:"1",label:"+1 БАЛЛ"},{code:"2",label:"+2 БАЛЛА"},{code:"3",label:"+3 БАЛЛА"},{code:"4",label:"+4 БАЛЛА"},{code:"0",label:"МИМО"},{code:"-",label:"ГАМ-ДЖОН"}]}
];

function onYouTubeIframeAPIReady(){
  player=new YT.Player("player",{
    height:"100%",width:"100%",videoId:"",
    playerVars:{playsinline:1,rel:0,controls:0,disablekb:1},
    events:{
      onReady:()=>{ready=true;},
      onStateChange:e=>{
        document.getElementById("playBtn").textContent=e.data===1?"ПАУЗА":"ПУСК";
        if(e.data===1) startProg(); else stopProg();
      }
    }
  });
}

function loadVideo(){
  const url=document.getElementById("urlInput").value;
  const m=url.match(/(?:v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  if(m){vidId=m[1]; player.loadVideoById(vidId);}
}

function togglePlay(){if(player.getPlayerState()===1)player.pauseVideo();else player.playVideo();}
function seekRel(s){player.seekTo(player.getCurrentTime()+s,true);}
function seekClick(e){
  const rect=document.getElementById("progressWrap").getBoundingClientRect();
  const pos=(e.clientX-rect.left)/rect.width;
  player.seekTo(pos*player.getDuration(),true);
}
function chSpeed(d){
  spdIdx=Math.max(0,Math.min(SPEEDS.length-1,spdIdx+d));
  if(ready) player.setPlaybackRate(SPEEDS[spdIdx]);
  document.getElementById("speedDisp").textContent=SPEEDS[spdIdx]+"x";
}

function startProg(){
  stopProg();
  progTimer=setInterval(()=>{
    const c=player.getCurrentTime()||0, d=player.getDuration()||1;
    document.getElementById("progressFill").style.width=(c/d*100)+"%";
    document.getElementById("timeDisp").textContent=fmt(c)+" / "+fmt(d);
  },500);
}
function stopProg(){if(progTimer)clearInterval(progTimer);}
function fmt(s){s=Math.floor(s); return Math.floor(s/60)+":"+String(s%60).padStart(2,"0");}

function setAnchor(){
  const rawTime = player.getCurrentTime();
  anchorTime = Math.floor(Math.max(0, rawTime - 3));
  player.seekTo(Math.max(0, rawTime - 5), true);
  player.setPlaybackRate(0.5);
  spdIdx=1;
  document.getElementById("speedDisp").textContent="0.5x";
  player.playVideo();
  curStep=0; sel={}; renderStep();
}

function renderStep(){
  if(curStep<0) return;
  const step=STEPS[curStep];
  document.getElementById("stepLabel").textContent=step.label;
  document.getElementById("backBtn").style.display="block";
  document.getElementById("saveBtn").style.display="none";
  const container=document.getElementById("step-btns");
  container.innerHTML="";
  step.opts.forEach(opt=>{
    const b=document.createElement("button");
    b.className="sbtn " + (opt.cls || "");
    b.textContent=opt.label;
    b.onclick=()=>pick(step.key,opt.code);
    container.appendChild(b);
  });
}

function pick(key,code){
  sel[key]=code;
  updateCode();
  if(curStep<STEPS.length-1){
    curStep++; renderStep();
  } else {
    document.getElementById("step-btns").innerHTML="";
    document.getElementById("saveBtn").style.display="block";
    document.getElementById("stepLabel").textContent="ПРОВЕРЬТЕ КОД";
  }
}

function updateCode(){
  document.getElementById("codeDisp").textContent=(sel.fighter||"")+(sel.init||"")+(sel.weapon||"")+(sel.zone||"")+(sel.result||"");
}

function saveEvent(){
  events.push({id:Date.now(),fighter:sel.fighter==="B"?"Blue":"Red",time:anchorTime,code:document.getElementById("codeDisp").textContent,link:"https://youtu.be/"+vidId+"?t="+anchorTime});
  spdIdx=3; player.setPlaybackRate(1);
  document.getElementById("speedDisp").textContent="1x";
  renderEvents();
  resetTag();
}

function resetTag(){
  curStep=-1; sel={};
  document.getElementById("step-btns").innerHTML="";
  document.getElementById("saveBtn").style.display="none";
  document.getElementById("backBtn").style.display="none";
  document.getElementById("codeDisp").textContent="—";
  document.getElementById("stepLabel").textContent="ОЖИДАНИЕ СОБЫТИЯ...";
}

function goBack(){
  if(curStep===0){
    spdIdx=3; player.setPlaybackRate(1);
    document.getElementById("speedDisp").textContent="1x";
    resetTag();
  } else if(curStep>0){
    curStep--;
    delete sel[STEPS[curStep].key];
    renderStep();
  } else {
    resetTag();
  }
}

function renderEvents(){
  const list=document.getElementById("events-list");
  list.innerHTML="";
  document.getElementById("evCount").textContent=events.length;
  events.slice().reverse().forEach(ev=>{
    const card=document.createElement("div");
    card.className="ecard "+ev.fighter.toLowerCase();
    card.innerHTML=`<div class="ecard-top"><span>${ev.code}</span><span>${fmt(ev.time)}</span></div>
    <a class="ecard-link" href="${ev.link}" target="_blank">СМОТРЕТЬ ПОВТОР</a>
    <button class="del-btn" onclick="delEv(${ev.id})">✕</button>`;
    list.appendChild(card);
  });
}

function delEv(id){events=events.filter(x=>x.id!==id); renderEvents();}
function dlJSON(){
  const blob=new Blob([JSON.stringify(events)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="tkd_report.json"; a.click();
}

// KEYBOARD SUPPORT
window.addEventListener("keydown", e=>{
  if(document.activeElement.tagName==="INPUT") return;
  if(e.code==="Space"){ e.preventDefault(); if(curStep<0) setAnchor(); else togglePlay(); }
  if(e.code==="Backspace") goBack();
});
</script>
</body>
</html>
