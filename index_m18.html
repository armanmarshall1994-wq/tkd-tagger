<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TKD Tagger Mobile v1.8</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red: #e94560; --blue: #3a8fd1; --green: #27ae60;
    --bg: #0d0d14; --bg2: #13131f; --bg3: #1a1a2e;
    --border: #252535; --text: #d0d0e0; --muted: #555570;
  }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.4; }

  header {
    height: 50px; background: var(--bg2); border-bottom: 2px solid var(--red);
    display: flex; align-items: center; gap: 8px; padding: 0 10px; position: sticky; top: 0; z-index: 100;
  }
  .logo { font-size: 12px; font-weight: 800; color: #fff; white-space: nowrap; }
  .logo span { color: var(--red); }
  #urlInput {
    flex: 1; background: #000; border: 1px solid var(--border);
    border-radius: 4px; padding: 6px; color: #fff; font-size: 11px; outline: none;
  }
  #loadBtn { padding: 6px 10px; background: var(--red); color: #fff; border: none; border-radius: 4px; font-weight: 700; font-size: 11px; }

  #player-wrap {
    width: 100%; aspect-ratio: 16/9; background: #000;
    position: sticky; top: 50px; z-index: 90; border-bottom: 1px solid var(--border);
  }
  #player { width: 100%; height: 100%; }

  #controls {
    background: var(--bg2); padding: 8px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .btn-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
  .cbtn {
    background: var(--bg3); border: 1px solid var(--border); color: var(--text);
    padding: 10px 2px; border-radius: 4px; font-size: 11px; font-weight: 600; text-align: center;
  }

  /* TIMELINE */
  #progress-container { display: flex; align-items: center; gap: 10px; padding: 4px 0; }
  #progressWrap { flex: 1; height: 12px; background: var(--border); border-radius: 6px; position: relative; cursor: pointer; }
  #progressFill { height: 100%; background: var(--red); border-radius: 6px; width: 0%; pointer-events: none; }
  #timeDisp { font-size: 10px; color: var(--muted); font-family: monospace; min-width: 70px; text-align: right; }

  #anchorBtn { background: var(--red); color: #fff; font-size: 14px; font-weight: 800; padding: 14px; border-radius: 6px; border: none; width: 100%; }

  #tag-panel {
    background: var(--bg2); border-top: 1px solid var(--border); padding: 12px;
    min-height: 220px;
  }
  .step-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  #stepLabel { font-weight: 700; color: var(--red); font-size: 16px; }
  #backBtn { padding: 6px 12px; background: var(--bg3); border: 1px solid var(--border); color: var(--text); border-radius: 4px; font-size: 12px; }

  #step-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
  .sbtn {
    padding: 18px 10px; border-radius: 8px; border: 2px solid var(--border);
    background: var(--bg3); color: var(--text); font-size: 15px; font-weight: 700;
  }
  .sbtn.sel-b { border-color: var(--blue); color: var(--blue); background: rgba(58,143,209,0.1); }
  .sbtn.sel-r { border-color: var(--red); color: var(--red); background: rgba(233,69,96,0.1); }
  .sbtn.sel-g { border-color: var(--green); color: var(--green); background: rgba(39,174,96,0.1); }

  .code-row { display: flex; align-items: center; justify-content: space-between; background: var(--bg3); padding: 12px; border-radius: 8px; border: 1px solid var(--border); }
  #codeDisp { font-size: 24px; font-weight: 900; color: var(--red); letter-spacing: 2px; }
  #saveBtn { padding: 12px 24px; background: var(--green); color: #fff; border: none; border-radius: 6px; font-weight: 800; font-size: 14px; }

  #right { padding: 12px; background: var(--bg); }
  #right-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  #evCount { font-size: 24px; font-weight: 900; color: var(--red); }
  .ecard { background: var(--bg2); border-radius: 8px; padding: 12px; margin-bottom: 10px; border-left: 4px solid var(--border); position: relative; }
  .ecard.blue { border-left-color: var(--blue); }
  .ecard.red { border-left-color: var(--red); }
  .ecard-top { display: flex; justify-content: space-between; margin-bottom: 5px; font-weight: 800; }
  .ecard-link { color: var(--blue); text-decoration: none; font-size: 12px; display: block; margin-top: 8px; }
  .del-btn { position: absolute; top: 10px; right: 10px; color: var(--muted); background: none; border: none; font-size: 18px; }

  #dlBtn { width: 100%; padding: 18px; background: var(--bg3); border: 1px solid var(--border); color: #fff; font-weight: 700; border-radius: 8px; margin-top: 20px; font-size: 14px; }
</style>
</head>
<body>

<header>
  <div class="logo">TKD <span>V1.8M</span></div>
  <input type="text" id="urlInput" placeholder="YouTube URL">
  <button id="loadBtn" onclick="loadVideo()">OK</button>
</header>

<div class="wrap">
  <div id="player-wrap">
    <div id="player"></div>
  </div>

  <div id="controls">
    <div class="btn-row">
      <button class="cbtn" id="playBtn" onclick="togglePlay()">▶</button>
      <button class="cbtn" onclick="seekRel(-10)">-10с</button>
      <button class="cbtn" onclick="seekRel(-3)">-3с</button>
      <button class="cbtn" onclick="seekRel(3)">+3с</button>
      <button class="cbtn" onclick="seekRel(10)">+10с</button>
    </div>

    <div id="progress-container">
      <div id="progressWrap" onclick="seekClick(event)">
        <div id="progressFill"></div>
      </div>
      <div id="timeDisp">0:00 / 0:00</div>
    </div>

    <button id="anchorBtn" onclick="setAnchor()">📍 ЯКОРЬ (ФИКСАЦИЯ)</button>
  </div>

  <div id="tag-panel">
    <div class="step-row">
      <span id="stepLabel">Ожидание якоря...</span>
      <button id="backBtn" onclick="goBack()" style="display:none">Назад</button>
    </div>
    <div id="step-btns"></div>
    <div class="code-row">
      <div id="codeDisp">—</div>
      <button id="saveBtn" onclick="saveEvent()" style="display:none">СОХРАНИТЬ</button>
    </div>
  </div>

  <div id="right">
    <div id="right-header">
      <span>СОБЫТИЯ</span>
      <div id="evCount">0</div>
    </div>
    <div id="events-list"></div>
    <button id="dlBtn" onclick="dlJSON()">СКАЧАТЬ JSON</button>
  </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
let player, ready=false, vidId="", events=[], anchorTime=0, curStep=-1, sel={}, progTimer=null;
const STEPS=[
  {key:"fighter",label:"Боец",opts:[{code:"B",label:"🔵 Blue",cls:"sel-b"},{code:"R",label:"🔴 Red",cls:"sel-r"}]},
  {key:"init",label:"Инициатива",opts:[{code:"A",label:"Атака"},{code:"C",label:"Контра"},{code:"S",label:"Встреч."}]},
  {key:"weapon",label:"Оружие",opts:[{code:"1",label:"Перед."}, {code:"2",label:"Задняя"}, {code:"3",label:"Рука"}, {code:"4",label:"Развор."}]},
  {key:"zone",label:"Зона",opts:[{code:"V",label:"Корпус"},{code:"H",label:"Голова"}]},
  {key:"result",label:"Итог",opts:[{code:"1",label:"+1"},{code:"2",label:"+2"},{code:"3",label:"+3"},{code:"4",label:"+4"},{code:"0",label:"Мимо"},{code:"-",label:"Гам-джон"}]}
];

function onYouTubeIframeAPIReady(){
  player=new YT.Player("player",{
    height:"100%",width:"100%",videoId:"",
    playerVars:{playsinline:1,rel:0,controls:0,disablekb:1},
    events:{
      onReady:()=>{ready=true;},
      onStateChange:e=>{
        document.getElementById("playBtn").textContent=e.data===1?"⏸":"▶";
        if(e.data===1) startProg(); else stopProg();
      }
    }
  });
}

function loadVideo(){
  const url=document.getElementById("urlInput").value;
  const m=url.match(/(?:v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  if(m){vidId=m[1]; player.loadVideoById(vidId);}
}

function togglePlay(){if(player.getPlayerState()===1)player.pauseVideo();else player.playVideo();}
function seekRel(s){player.seekTo(player.getCurrentTime()+s,true);}
function seekClick(e){
  const rect=document.getElementById("progressWrap").getBoundingClientRect();
  const pos=(e.clientX-rect.left)/rect.width;
  player.seekTo(pos*player.getDuration(),true);
}

function startProg(){
  stopProg();
  progTimer=setInterval(()=>{
    const c=player.getCurrentTime()||0, d=player.getDuration()||1;
    document.getElementById("progressFill").style.width=(c/d*100)+"%";
    document.getElementById("timeDisp").textContent=fmt(c)+" / "+fmt(d);
  },500);
}
function stopProg(){if(progTimer)clearInterval(progTimer);}
function fmt(s){s=Math.floor(s); return Math.floor(s/60)+":"+String(s%60).padStart(2,"0");}

function setAnchor(){
  anchorTime=Math.floor(player.getCurrentTime());
  player.seekTo(Math.max(0,anchorTime-3),true);
  player.setPlaybackRate(0.5);
  player.playVideo();
  curStep=0; sel={}; renderStep();
}

function renderStep(){
  if(curStep<0) return;
  const step=STEPS[curStep];
  document.getElementById("stepLabel").textContent=step.label;
  document.getElementById("backBtn").style.display=curStep>0?"block":"none";
  const container=document.getElementById("step-btns");
  container.innerHTML="";
  step.opts.forEach(opt=>{
    const b=document.createElement("button");
    b.className="sbtn";
    b.textContent=opt.label;
    b.onclick=()=>pick(step.key,opt.code);
    container.appendChild(b);
  });
}

function pick(key,code){
  sel[key]=code;
  updateCode();
  if(curStep<STEPS.length-1){
    curStep++; renderStep();
  } else {
    document.getElementById("step-btns").innerHTML="";
    document.getElementById("saveBtn").style.display="block";
    document.getElementById("stepLabel").textContent="Проверьте и сохраните";
  }
}

function updateCode(){
  document.getElementById("codeDisp").textContent=(sel.fighter||"")+(sel.init||"")+(sel.weapon||"")+(sel.zone||"")+(sel.result||"");
}

function saveEvent(){
  events.push({id:Date.now(),fighter:sel.fighter==="B"?"Blue":"Red",time:anchorTime,code:document.getElementById("codeDisp").textContent,link:"https://youtu.be/"+vidId+"?t="+anchorTime});
  player.setPlaybackRate(1);
  renderEvents();
  resetTag();
}

function resetTag(){
  curStep=-1; sel={};
  document.getElementById("step-btns").innerHTML="";
  document.getElementById("saveBtn").style.display="none";
  document.getElementById("codeDisp").textContent="—";
  document.getElementById("stepLabel").textContent="Нажмите ЯКОРЬ";
}

function renderEvents(){
  const list=document.getElementById("events-list");
  list.innerHTML="";
  document.getElementById("evCount").textContent=events.length;
  events.slice().reverse().forEach(ev=>{
    const card=document.createElement("div");
    card.className="ecard "+ev.fighter.toLowerCase();
    card.innerHTML=`<div class="ecard-top"><span>${ev.code}</span><span>${fmt(ev.time)}</span></div>
    <a class="ecard-link" href="${ev.link}" target="_blank">Смотреть момент</a>
    <button class="del-btn" onclick="delEv(${ev.id})">✕</button>`;
    list.appendChild(card);
  });
}

function delEv(id){events=events.filter(x=>x.id!==id); renderEvents();}
function goBack(){if(curStep>0){curStep--; renderStep();}}
function dlJSON(){
  const blob=new Blob([JSON.stringify(events)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="tkd_mobile.json"; a.click();
}
</script>
</body>
</html>
