<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TKD Tagger Universal v4.0</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red: #e94560; --blue: #3a8fd1; --green: #27ae60;
    --bg: #0d0d14; --bg2: #13131f; --bg3: #1a1a2e;
    --border: #252535; --text: #d0d0e0; --muted: #555570;
  }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

  header {
    height: 50px; background: var(--bg2); border-bottom: 2px solid var(--red);
    display: flex; align-items: center; gap: 10px; padding: 0 15px;
  }
  .logo { font-size: 16px; font-weight: 900; color: #fff; white-space: nowrap; }
  .logo span { color: var(--red); }
  #urlInput {
    flex: 1; background: #000; border: 1px solid var(--border);
    border-radius: 4px; padding: 8px; color: #fff; font-size: 13px; outline: none;
  }
  #loadBtn { padding: 8px 15px; background: var(--red); color: #fff; border: none; border-radius: 4px; font-weight: 800; cursor: pointer; white-space: nowrap; }

  /* ===================== DESKTOP ===================== */
  @media (min-width: 1024px) {
    body { overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

    /* Top area: video + tags side by side */
    #top-area {
      display: grid;
      grid-template-columns: 1fr 280px;
      flex-shrink: 0;
      gap: 0;
      border-bottom: 1px solid var(--border);
    }

    #player-wrap {
      width: 100%;
      aspect-ratio: 16/9;
      max-height: calc(100vh - 50px - 130px - 10px);
      background: #000;
      overflow: hidden;
    }
    #player { width: 100%; height: 100%; }

    /* Tag panel — right of video */
    #tag-panel {
      background: var(--bg2);
      border-left: 1px solid var(--border);
      padding: 15px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Controls bar — under video+tags, fixed height */
    #controls-bar {
      flex-shrink: 0;
      background: var(--bg2);
      padding: 10px 15px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* Events — scrollable bottom */
    #events-area {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
    }
  }

  /* ===================== MOBILE ===================== */
  @media (max-width: 1023px) {
    #top-area { display: flex; flex-direction: column; }
    #player-wrap { width: 100%; aspect-ratio: 16/9; background: #000; }
    #player { width: 100%; height: 100%; }
    #controls-bar { padding: 10px; display: flex; flex-direction: column; gap: 8px; background: var(--bg2); border-top: 1px solid var(--border); }
    #tag-panel { padding: 12px; background: var(--bg3); border-top: 1px solid var(--border); min-height: 220px; }
    #events-area { padding: 12px; }
  }

  /* ===================== CONTROLS ===================== */
  .btn-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
  .cbtn {
    background: var(--bg3); border: 1px solid var(--border); color: var(--text);
    padding: 10px 2px; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer;
  }
  .cbtn:hover { background: var(--border); }

  .speed-row { display: flex; align-items: center; gap: 8px; }
  .spd-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 8px 14px; border-radius: 6px; font-weight: 800; cursor: pointer; font-size: 12px; }
  #speedDisp { flex: 1; text-align: center; font-size: 16px; font-weight: 900; color: var(--red); background: var(--bg3); padding: 7px; border-radius: 6px; }

  #progress-container { display: flex; align-items: center; gap: 10px; }
  #progressWrap { flex: 1; height: 12px; background: var(--border); border-radius: 6px; cursor: pointer; position: relative; }
  #progressFill { height: 100%; background: var(--red); border-radius: 6px; width: 0%; pointer-events: none; }
  #timeDisp { font-family: monospace; font-size: 11px; color: var(--muted); min-width: 80px; text-align: right; }

  #anchorBtn {
    background: var(--red); color: #fff; font-size: 15px; font-weight: 900;
    padding: 13px; border-radius: 8px; border: none; width: 100%; cursor: pointer;
    box-shadow: 0 4px 10px rgba(233,69,96,0.25);
  }
  #anchorBtn:active { transform: scale(0.98); }

  /* ===================== TAG PANEL ===================== */
  .step-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  #stepLabel { font-size: 15px; font-weight: 900; color: var(--red); }
  #backBtn { padding: 6px 12px; background: var(--bg3); border: 1px solid var(--border); color: var(--text); border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 700; }

  #step-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; flex-grow: 1; }
  .sbtn {
    padding: 18px 8px; border-radius: 8px; border: 2px solid var(--border);
    background: var(--bg3); color: var(--text); font-size: 13px; font-weight: 800; cursor: pointer; transition: 0.15s;
  }
  .sbtn:hover { border-color: var(--muted); }
  .sbtn.sel-b { border-color: var(--blue); color: var(--blue); background: rgba(58,143,209,0.1); }
  .sbtn.sel-r { border-color: var(--red); color: var(--red); background: rgba(233,69,96,0.1); }

  .code-preview {
    display: flex; align-items: center; justify-content: space-between;
    background: #000; padding: 12px; border-radius: 8px; border: 1px solid var(--border); margin-top: auto;
  }
  #codeDisp { font-size: 22px; font-weight: 900; color: var(--red); letter-spacing: 2px; }
  #saveBtn { padding: 10px 18px; background: var(--green); color: #fff; border: none; border-radius: 6px; font-weight: 900; font-size: 13px; cursor: pointer; }

  /* ===================== EVENTS ===================== */
  #events-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  #events-header h2 { font-size: 16px; font-weight: 900; }
  #evCount { color: var(--red); font-size: 20px; font-weight: 900; }
  #events-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
  .ecard { background: var(--bg2); border-radius: 8px; padding: 12px; border-left: 4px solid var(--border); position: relative; }
  .ecard.blue { border-left-color: var(--blue); }
  .ecard.red { border-left-color: var(--red); }
  .ecard-top { display: flex; justify-content: space-between; font-size: 16px; font-weight: 900; margin-bottom: 6px; }
  .ecard-link { color: var(--blue); text-decoration: none; font-size: 12px; font-weight: 700; }
  .del-btn { position: absolute; top: 8px; right: 8px; background: none; border: none; color: var(--muted); font-size: 16px; cursor: pointer; }
  #dlBtn { margin-top: 15px; width: 100%; padding: 14px; background: var(--bg2); border: 1px solid var(--border); color: #fff; font-weight: 800; border-radius: 8px; cursor: pointer; }
</style>
</head>
<body>

<header>
  <div class="logo">TKD <span>V4.0</span></div>
  <input type="text" id="urlInput" placeholder="YouTube URL">
  <button id="loadBtn" onclick="loadVideo()">ЗАГРУЗИТЬ</button>
</header>

<!-- TOP: video + tag panel -->
<div id="top-area">
  <div id="player-wrap">
    <div id="player"></div>
  </div>

  <div id="tag-panel">
    <div class="step-header">
      <span id="stepLabel">Ожидание якоря...</span>
      <button id="backBtn" onclick="goBack()" style="display:none">◀ НАЗАД</button>
    </div>
    <div id="step-btns"></div>
    <div class="code-preview">
      <div id="codeDisp">—</div>
      <button id="saveBtn" onclick="saveEvent()" style="display:none">СОХРАНИТЬ</button>
    </div>
  </div>
</div>

<!-- CONTROLS: under video, always visible -->
<div id="controls-bar">
  <div style="display:flex; gap:8px; align-items:center;">
    <div class="btn-row" style="flex:1;">
      <button class="cbtn" id="playBtn" onclick="togglePlay()">ПУСК</button>
      <button class="cbtn" onclick="seekRel(-10)">-10с</button>
      <button class="cbtn" onclick="seekRel(-3)">-3с</button>
      <button class="cbtn" onclick="seekRel(3)">+3с</button>
      <button class="cbtn" onclick="seekRel(10)">+10с</button>
    </div>
    <button class="spd-btn" onclick="chSpeed(-1)">−</button>
    <div id="speedDisp" style="min-width:50px;">1x</div>
    <button class="spd-btn" onclick="chSpeed(1)">+</button>
  </div>
  <div id="progress-container">
    <div id="progressWrap" onclick="seekClick(event)">
      <div id="progressFill"></div>
    </div>
    <div id="timeDisp">0:00 / 0:00</div>
  </div>
  <button id="anchorBtn" onclick="setAnchor()">📍 ФИКСИРОВАТЬ МОМЕНТ (ЯКОРЬ)</button>
</div>

<!-- EVENTS: scrollable below -->
<div id="events-area">
  <div id="events-header">
    <h2>СОБЫТИЯ</h2>
    <span id="evCount">0</span>
  </div>
  <div id="events-grid"></div>
  <button id="dlBtn" onclick="dlJSON()">СКАЧАТЬ ОТЧЕТ (JSON)</button>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
let player, ready=false, vidId="", events=[], anchorTime=0, curStep=-1, sel={}, progTimer=null;
const SPEEDS=[0.25,0.5,0.75,1,1.25,1.5,2];
let spdIdx=3;

const STEPS=[
  {key:"fighter",label:"КТО УДАРИЛ?",opts:[{code:"B",label:"🔵 СИНИЙ",cls:"sel-b"},{code:"R",label:"🔴 КРАСНЫЙ",cls:"sel-r"}]},
  {key:"init",label:"ТИП АТАКИ",opts:[{code:"A",label:"АТАКА"},{code:"C",label:"КОНТРА"},{code:"S",label:"ВСТРЕЧНЫЙ"}]},
  {key:"weapon",label:"ЧЕМ?",opts:[{code:"1",label:"ПЕРЕДНЯЯ"},{code:"2",label:"ЗАДНЯЯ"},{code:"3",label:"РУКА"},{code:"4",label:"РАЗВОРОТ"}]},
  {key:"zone",label:"КУДА?",opts:[{code:"V",label:"КОРПУС"},{code:"H",label:"ГОЛОВА"}]},
  {key:"result",label:"РЕЗУЛЬТАТ",opts:[{code:"1",label:"+1"},{code:"2",label:"+2"},{code:"3",label:"+3"},{code:"4",label:"+4"},{code:"0",label:"МИМО"},{code:"-",label:"ГАМ-ДЖ."}]}
];

function onYouTubeIframeAPIReady(){
  player=new YT.Player("player",{
    height:"100%",width:"100%",videoId:"",
    playerVars:{playsinline:1,rel:0,controls:0,disablekb:1},
    events:{
      onReady:()=>{ready=true;},
      onStateChange:e=>{
        document.getElementById("playBtn").textContent=e.data===1?"ПАУЗА":"ПУСК";
        if(e.data===1) startProg(); else stopProg();
      }
    }
  });
}

function loadVideo(){
  const url=document.getElementById("urlInput").value;
  const m=url.match(/(?:v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  if(m){vidId=m[1]; player.loadVideoById(vidId);}
}

function togglePlay(){if(player.getPlayerState()===1)player.pauseVideo();else player.playVideo();}
function seekRel(s){player.seekTo(player.getCurrentTime()+s,true);}
function seekClick(e){
  const rect=document.getElementById("progressWrap").getBoundingClientRect();
  const pos=(e.clientX-rect.left)/rect.width;
  player.seekTo(pos*player.getDuration(),true);
}
function chSpeed(d){
  spdIdx=Math.max(0,Math.min(SPEEDS.length-1,spdIdx+d));
  if(ready) player.setPlaybackRate(SPEEDS[spdIdx]);
  document.getElementById("speedDisp").textContent=SPEEDS[spdIdx]+"x";
}

function startProg(){
  stopProg();
  progTimer=setInterval(()=>{
    const c=player.getCurrentTime()||0, d=player.getDuration()||1;
    document.getElementById("progressFill").style.width=(c/d*100)+"%";
    document.getElementById("timeDisp").textContent=fmt(c)+" / "+fmt(d);
  },500);
}
function stopProg(){if(progTimer)clearInterval(progTimer);}
function fmt(s){s=Math.floor(s); return Math.floor(s/60)+":"+String(s%60).padStart(2,"0");}

function setAnchor(){
  const rawTime=player.getCurrentTime();
  anchorTime=Math.floor(Math.max(0,rawTime-3));
  player.seekTo(Math.max(0,rawTime-5),true);
  player.setPlaybackRate(0.5);
  spdIdx=1;
  document.getElementById("speedDisp").textContent="0.5x";
  player.playVideo();
  curStep=0; sel={}; renderStep();
}

function renderStep(){
  if(curStep<0) return;
  const step=STEPS[curStep];
  document.getElementById("stepLabel").textContent=step.label;
  document.getElementById("backBtn").style.display="block";
  document.getElementById("saveBtn").style.display="none";
  const container=document.getElementById("step-btns");
  container.innerHTML="";
  step.opts.forEach(opt=>{
    const b=document.createElement("button");
    b.className="sbtn "+(opt.cls||"");
    b.textContent=opt.label;
    b.onclick=()=>pick(step.key,opt.code);
    container.appendChild(b);
  });
}

function pick(key,code){
  sel[key]=code;
  updateCode();
  if(curStep<STEPS.length-1){
    curStep++; renderStep();
  } else {
    document.getElementById("step-btns").innerHTML="";
    document.getElementById("saveBtn").style.display="block";
    document.getElementById("stepLabel").textContent="ГОТОВО — СОХРАНИТЕ";
  }
}

function updateCode(){
  document.getElementById("codeDisp").textContent=(sel.fighter||"")+(sel.init||"")+(sel.weapon||"")+(sel.zone||"")+(sel.result||"");
}

function saveEvent(){
  events.push({id:Date.now(),fighter:sel.fighter==="B"?"Blue":"Red",time:anchorTime,code:document.getElementById("codeDisp").textContent,link:"https://youtu.be/"+vidId+"?t="+anchorTime});
  spdIdx=3; player.setPlaybackRate(1);
  document.getElementById("speedDisp").textContent="1x";
  renderEvents(); resetTag();
}

function resetTag(){
  curStep=-1; sel={};
  document.getElementById("step-btns").innerHTML="";
  document.getElementById("saveBtn").style.display="none";
  document.getElementById("backBtn").style.display="none";
  document.getElementById("codeDisp").textContent="—";
  document.getElementById("stepLabel").textContent="ОЖИДАНИЕ ЯКОРЯ...";
}

function goBack(){
  if(curStep===0){
    spdIdx=3; player.setPlaybackRate(1);
    document.getElementById("speedDisp").textContent="1x";
    resetTag();
  } else if(curStep>0){
    curStep--;
    delete sel[STEPS[curStep].key];
    renderStep();
  } else { resetTag(); }
}

function renderEvents(){
  const grid=document.getElementById("events-grid");
  grid.innerHTML="";
  document.getElementById("evCount").textContent=events.length;
  events.slice().reverse().forEach(ev=>{
    const card=document.createElement("div");
    card.className="ecard "+ev.fighter.toLowerCase();
    card.innerHTML=`<div class="ecard-top"><span>${ev.code}</span><span>${fmt(ev.time)}</span></div>
    <a class="ecard-link" href="${ev.link}" target="_blank">СМОТРЕТЬ ПОВТОР</a>
    <button class="del-btn" onclick="delEv(${ev.id})">✕</button>`;
    grid.appendChild(card);
  });
}

function delEv(id){events=events.filter(x=>x.id!==id); renderEvents();}
function dlJSON(){
  const blob=new Blob([JSON.stringify(events,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="tkd_report.json"; a.click();
}

window.addEventListener("keydown",e=>{
  if(document.activeElement.tagName==="INPUT") return;
  if(e.code==="Space"){e.preventDefault(); if(curStep<0) setAnchor(); else togglePlay();}
  if(e.code==="Backspace") goBack();
});
</script>
</body>
</html>
